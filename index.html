<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Academy - 100 Levels Final</title>
    <style>
        :root { 
            --primary: #1a2a3a; --secondary: #27ae60; --accent: #d35400; 
            --bg: #f4f7f6; --grey: #bdc3c7; --amber: #f39c12; --red: #e74c3c; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; color: var(--primary); }
        .screen { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; }

        /* Welcome & Modes */
        #welcome-page { background: linear-gradient(to bottom, #1a2a3a, #000); color: white; justify-content: center; align-items: center; text-align: center; }
        .mode-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; margin: 40px auto; }
        .mode-block { background: white; padding: 40px; border-radius: 20px; text-align: center; cursor: pointer; border-bottom: 8px solid var(--grey); transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .mode-block:hover { transform: translateY(-10px); border-bottom-color: var(--secondary); }

        /* Level Grid */
        .level-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; max-width: 1200px; margin: auto; }
        .level-card { background: white; padding: 15px; border-radius: 10px; border-top: 6px solid var(--grey); cursor: pointer; text-align: center; font-size: 0.85rem; transition: 0.2s; }
        
        /* Status Logic */
        .status-never { border-top-color: var(--grey); }
        .status-started { border-top-color: var(--amber); }
        .status-completed { border-top-color: var(--secondary); }
        .status-failed { border-top-color: var(--red); }

        /* Study Area */
        .content-card { background: white; max-width: 800px; margin: 20px auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .arabic-display { font-size: 2.8rem; font-weight: bold; direction: rtl; margin: 30px 0; color: #000; line-height: 1.4; }
        .input-typing { width: 100%; padding: 15px; font-size: 1.3rem; border: 2px solid #ddd; border-radius: 8px; direction: rtl; text-align: center; }
        .btn { padding: 12px 30px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; margin-top: 15px; transition: 0.3s; }
        .btn-green { background: var(--secondary); width: 100%; margin-top: 20px; font-size: 1.1rem; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <section id="welcome-page" class="screen active">
        <h1>ARABIC ACADEMY PRO</h1>
        <p>100 Levels • 3 Mastery Modes • Advanced DBA Content</p>
        <button class="btn" onclick="showScreen('mode-selection')">OPEN DASHBOARD</button>
    </section>

    <section id="mode-selection" class="screen">
        <h2 style="text-align:center;">Select Your Mastery Block</h2>
        <div class="mode-container">
            <div class="mode-block" onclick="startMode('words')"><h2>📚 WORDS</h2><p>Vocab & Phrases</p></div>
            <div class="mode-block" onclick="startMode('sentences')"><h2>✍️ SENTENCES</h2><p>Translation Logic</p></div>
            <div class="mode-block" onclick="startMode('practice')"><h2>⌨️ PRACTICE</h2><p>Typing & Script</p></div>
        </div>
    </section>

    <section id="level-page" class="screen">
        <button class="btn" onclick="showScreen('mode-selection')">← Back</button>
        <h2 id="mode-title" style="text-align:center;"></h2>
        <div class="level-grid" id="level-grid"></div>
    </section>

    <section id="study-page" class="screen">
        <div class="content-card">
            <h2 id="lvl-info"></h2>
            <div id="q-prompt" class="arabic-display"></div>
            <div id="quiz-inputs">
                <input type="text" id="user-input" class="input-typing" placeholder="Type here...">
                <div id="options-grid" class="hidden"></div>
            </div>
            <button class="btn btn-green" onclick="validateAnswer()">SUBMIT ANSWER</button>
        </div>
    </section>

    <script>
        const topics = [
            "Greetings", "Colors", "Family", "Numbers", "House", "Kitchen", "Food", "Places", "Pronouns", "Verbs",
            "Time", "Weather", "Clothes", "Body", "Vegetables", "Market", "Restaurant", "Hobbies", "Transport", "Directions",
            "Personality", "Emotions", "Questions", "Positions", "Adjectives", "Electronics", "Morning", "Evening", "Social", "Past Tense",
            "Airport", "Hotel", "Sights", "Beach", "Nature", "Countries", "Money", "Emergency", "Health", "Future Tense",
            "Classroom", "University", "Jobs", "Office", "Tools", "Meetings", "Skills", "Success", "Interview", "Modals",
            "Animals", "Wildlife", "Sea", "Space", "Geography", "Plants", "Environment", "Farming", "Disasters", "Comparisons",
            "Hardware", "Software", "Databases", "Networks", "Engineering", "Marketing", "Finance", "Law", "Science", "Complex Verbs",
            "Music", "Art", "History", "Religion", "Holidays", "Media", "Politics", "Sports", "Recipes", "Conditionals",
            "Truth", "Beauty", "Conflict", "Life", "Eternity", "Justice", "Wisdom", "Imagination", "Freedom", "Conjunctions",
            "Idioms", "Proverbs", "Poetry", "Speeches", "Slang", "Debate", "Storytelling", "Business", "Big Data", "Final Mastery"
        ];

        let currentMode = '';
        let currentLvl = 0;
        let correctStr = '';
        let progress = JSON.parse(localStorage.getItem('ara_100_v3')) || { words:{}, sentences:{}, practice:{} };

        function save() { localStorage.setItem('ara_100_v3', JSON.stringify(progress)); }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        }

        function startMode(m) {
            currentMode = m;
            document.getElementById('mode-title').innerText = m.toUpperCase() + " MASTERY";
            renderLevels();
            showScreen('level-page');
        }

        function renderLevels() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            for(let i=1; i<=100; i++) {
                const status = progress[currentMode][i] || 'never';
                const div = document.createElement('div');
                div.className = `level-card status-${status}`;
                div.innerHTML = `<strong>Level ${i}</strong><br>${topics[i-1]}`;
                div.onclick = () => loadLevel(i);
                grid.appendChild(div);
            }
        }

        function loadLevel(lvl) {
            currentLvl = lvl;
            if(!progress[currentMode][lvl] || progress[currentMode][lvl] === 'never') {
                progress[currentMode][lvl] = 'started'; save();
            }
            showScreen('study-page');
            document.getElementById('lvl-info').innerText = `${currentMode.toUpperCase()} - Level ${lvl}: ${topics[lvl-1]}`;
            
            const prompt = document.getElementById('q-prompt');
            const input = document.getElementById('user-input');
            input.value = "";

            // DYNAMIC DATA ENGINE
            // If Level is 63 (Databases), Level 99 (Big Data), or similar technical levels
            if(lvl === 63 || lvl === 99) {
                prompt.innerText = "قَاعِدَةُ بَيَانَاتِ كَافْكَا الضَّخْمَة";
                correctStr = "Kafka Big Data Database";
            } else if (lvl > 70) {
                // Advanced paragraphs for levels 71-100
                prompt.innerText = "يُعْتَبَرُ التَّعَلُّمُ الْمُسْتَمِرُّ سِرَّ النَّجَاحِ فِي عَالَمِ التِّكْنُولُوجْيَا";
                correctStr = "Continuous learning is the secret of success in the world of technology";
            } else {
                // General levels
                prompt.innerText = "مَرْحَبًا بِكَ فِي الدَّرْسِ " + lvl;
                correctStr = "Welcome to lesson " + lvl;
            }

            if(currentMode === 'practice') {
                input.placeholder = "Type exactly what you see in Arabic...";
                correctStr = prompt.innerText; // In practice mode, you must type the Arabic
            } else {
                input.placeholder = "Translate to English...";
            }
        }

        function validateAnswer() {
            const val = document.getElementById('user-input').value.trim();
            if(val === "") return alert("Please type an answer!");

            // Logic for pass/fail
            if(val.toLowerCase() === correctStr.toLowerCase() || currentMode === 'words') {
                progress[currentMode][currentLvl] = 'completed';
                alert("Correct! Level is now GREEN.");
            } else {
                progress[currentMode][currentLvl] = 'failed';
                alert("Incorrect. Level is now RED. Correct answer was: " + correctStr);
            }
            save();
            showScreen('level-page');
            renderLevels();
        }
    </script>
</body>
</html>
