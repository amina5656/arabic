<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Academy - 100 Levels</title>
    <style>
        :root {
            --primary: #1a2a3a;
            --secondary: #27ae60;
            --accent: #d35400;
            --error: #e74c3c;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; color: var(--primary); }

        #welcome-screen {
            height: 100vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            color: white; text-align: center;
        }

        .btn-main {
            padding: 15px 50px; font-size: 1.2rem; border-radius: 8px; border: none;
            background: var(--secondary); color: white; cursor: pointer; transition: 0.3s;
            font-weight: bold; margin-top: 20px;
        }

        #main-app { display: none; padding: 20px; max-width: 800px; margin: auto; }
        .progress-bar { background: #ddd; height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 10px; }
        #progress-fill { background: var(--secondary); height: 100%; width: 0%; transition: 0.8s; }

        .module-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .module-card {
            background: white; padding: 20px; border-radius: 12px; border-left: 10px solid #bdc3c7;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer;
        }
        .module-card.unlocked { border-left-color: var(--secondary); }

        .card-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .item-row { display: flex; flex-direction: column; padding: 15px 0; border-bottom: 1px solid #eee; }
        .arabic-text { font-size: 2.2rem; font-weight: bold; color: #000; direction: rtl; }
        .pronunciation { font-size: 1.1rem; color: var(--accent); font-style: italic; margin: 5px 0; }
        .translation { font-size: 1.2rem; color: #444; font-weight: bold; }

        #quiz-box { display: none; background: white; padding: 30px; border-radius: 15px; text-align: center; }
        .option-btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            border: 2px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 1.1rem;
            background: white; transition: 0.2s;
        }
        .correct { background-color: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; }
        .wrong { background-color: #e74c3c !important; color: white !important; border-color: #c0392b !important; }

        .hidden { display: none; }
        .back-link { cursor: pointer; color: var(--accent); margin-bottom: 20px; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

    <section id="welcome-screen">
        <h1>ARABIC ACADEMY</h1>
        <p>Phonetic Reading • Levels 1 - 10</p>
        <button class="btn-main" onclick="initApp()">START LEARNING</button>
    </section>

    <main id="main-app">
        <div id="dashboard">
            <h2>Course Progress</h2>
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <div id="module-list" class="module-grid"></div>
        </div>

        <div id="lesson-view" class="hidden">
            <div class="back-link" onclick="showDashboard()">← Back to Dashboard</div>
            <h2 id="lesson-title"></h2>
            <div class="card-box" id="vocab-container"></div>
            <div class="card-box" id="sentence-container"></div>
            <button class="btn-main" style="width:100%;" onclick="startQuiz()">TAKE THE QUIZ</button>
        </div>

        <div id="quiz-box">
            <h2 id="q-text">Question</h2>
            <div id="q-ui">
                <div id="q-display" class="arabic-text" style="text-align:center; display:block; margin:20px 0;"></div>
                <div id="q-options"></div>
            </div>
            <p id="q-feedback"></p>
        </div>
    </main>

    <script>
        const courseData = [
            { id: 0, title: "Level 1: Greetings", words: [{a:"مَرْحَبًا", e:"Hello", p:"Mar-ha-ban"}, {a:"أَهْلًا", e:"Welcome", p:"Ah-lan"}, {a:"شُكْرًا", e:"Thank you", p:"Shuk-ran"}, {a:"عَفْوًا", e:"You're welcome", p:"Af-wan"}, {a:"كَيْفَ حَالُكَ؟", e:"How are you?", p:"Kay-fa Ha-luk?"}, {a:"أَنَا بِخَيْر", e:"I am fine", p:"A-na Bi-khayr"}], sentences: [{a:"مَرْحَبًا، كَيْفَ حَالُكَ؟", e:"Hello, how are you?", p:"Mar-ha-ban, kay-fa ha-luk?"}] },
            { id: 1, title: "Level 2: Colours", words: [{a:"أَحْمَر", e:"Red", p:"Ah-mar"}, {a:"أَزْرَق", e:"Blue", p:"Az-raq"}, {a:"أَخْضَر", e:"Green", p:"Akh-dar"}, {a:"أَصْفَر", e:"Yellow", p:"As-far"}, {a:"أَبْيَض", e:"White", p:"Ab-yad"}, {a:"أَسْوَد", e:"Black", p:"As-wad"}], sentences: [{a:"التُّفَّاحُ أَحْمَر", e:"The apple is red", p:"At-tuf-fa-hu ah-mar"}] },
            { id: 2, title: "Level 3: My Family", words: [{a:"أَب", e:"Father", p:"Ab"}, {a:"أُم", e:"Mother", p:"Umm"}, {a:"أَخ", e:"Brother", p:"Akh"}, {a:"أُخْت", e:"Sister", p:"Ukht"}, {a:"جَدّ", e:"Grandfather", p:"Jadd"}, {a:"جَدَّة", e:"Grandmother", p:"Jad-dah"}], sentences: [{a:"هَذَا أَبِي", e:"This is my father", p:"Ha-dha a-bi"}] },
            { id: 3, title: "Level 4: Numbers 1-10", words: [{a:"وَاحِد", e:"One", p:"Wa-hid"}, {a:"اِثْنَان", e:"Two", p:"Ith-nan"}, {a:"ثَلَاثَة", e:"Three", p:"Tha-la-thah"}, {a:"أَرْبَعَة", e:"Four", p:"Ar-ba-ah"}, {a:"خَمْسَة", e:"Five", p:"Kham-sah"}, {a:"عَشَرَة", e:"Ten", p:"A-sha-rah"}], sentences: [{a:"عِنْدِي كِتَابٌ وَاحِد", e:"I have one book", p:"In-di ki-ta-bun wa-hid"}] },
            { id: 4, title: "Level 5: Common Objects", words: [{a:"كِتَاب", e:"Book", p:"Ki-tab"}, {a:"قَلَم", e:"Pen", p:"Qa-lam"}, {a:"مِفْتَاح", e:"Key", p:"Mif-tah"}, {a:"هَاتِف", e:"Phone", p:"Ha-tif"}, {a:"حَقِيبَة", e:"Bag", p:"Ha-qi-bah"}, {a:"كُرْسِيّ", e:"Chair", p:"Kur-si"}], sentences: [{a:"أَيْنَ مِفْتَاحِي؟", e:"Where is my key?", p:"Ay-na mif-ta-hi?"}] },
            { id: 5, title: "Level 6: Around the House", words: [{a:"بَيْت", e:"House", p:"Bayt"}, {a:"بَاب", e:"Door", p:"Bab"}, {a:"نَافِذَة", e:"Window", p:"Na-fi-dhah"}, {a:"غُرْفَة", e:"Room", p:"Ghur-fah"}, {a:"مَطْبَخ", e:"Kitchen", p:"Mat-bakh"}, {a:"سَرِير", e:"Bed", p:"Sa-rir"}], sentences: [{a:"الْبَابُ مَفْتُوح", e:"The door is open", p:"Al-ba-bu maf-tuh"}] },
            { id: 6, title: "Level 7: Food & Drink", words: [{a:"مَاء", e:"Water", p:"Ma'"}, {a:"خُبْز", e:"Bread", p:"Khubz"}, {a:"حَلِيب", e:"Milk", p:"Ha-lib"}, {a:"تُفَّاح", e:"Apple", p:"Tuf-fah"}, {a:"قَهْوَة", e:"Coffee", p:"Qah-wah"}, {a:"لَحْم", e:"Meat", p:"Lahm"}], sentences: [{a:"أُرِيدُ مَاءً", e:"I want water", p:"U-ri-du ma-an"}] },
            { id: 7, title: "Level 8: The City", words: [{a:"سُوق", e:"Market", p:"Suq"}, {a:"مَدْرَسَة", e:"School", p:"Mad-ra-sah"}, {a:"مَسْجِد", e:"Mosque", p:"Mas-jid"}, {a:"مُسْتَشْفَى", e:"Hospital", p:"Mus-tash-fa"}, {a:"طَرِيق", e:"Road", p:"Ta-riq"}, {a:"مَدِينَة", e:"City", p:"Ma-di-nah"}], sentences: [{a:"الْمَسْجِدُ قَرِيب", e:"The mosque is near", p:"Al-mas-ji-du qa-rib"}] },
            { id: 8, title: "Level 9: Pronouns", words: [{a:"أَنَا", e:"I", p:"A-na"}, {a:"أَنْتَ", e:"You (Male)", p:"An-ta"}, {a:"أَنْتِ", e:"You (Female)", p:"An-ti"}, {a:"هُوَ", e:"He", p:"Hu-wa"}, {a:"هِيَ", e:"She", p:"Hi-ya"}, {a:"نَحْنُ", e:"We", p:"Nah-nu"}], sentences: [{a:"أَنَا عَرَبِي", e:"I am Arab", p:"A-na a-ra-bi"}] },
            { id: 9, title: "Level 10: Simple Verbs", words: [{a:"يَأْكُل", e:"Eat", p:"Ya'-kul"}, {a:"يَشْرَب", e:"Drink", p:"Yash-rab"}, {a:"يَذْهَب", e:"Go", p:"Yadh-hab"}, {a:"يَنَام", e:"Sleep", p:"Ya-nam"}, {a:"يَقْرَأ", e:"Read", p:"Yaq-ra'"}, {a:"يَكْتُب", e:"Write", p:"Yak-tub"}], sentences: [{a:"أَنَا أَكْتُبُ رِسَالَة", e:"I am writing a letter", p:"A-na ak-tu-bu ri-sa-lah"}] }
        ];

        // CHANGED STORAGE KEY TO RESET PROGRESS AND SHOW ALL LEVELS
        let userProgress = JSON.parse(localStorage.getItem('arabic_academy_v100_final')) || { unlocked: 0 };
        let currentLevel = 0, quizPool = [], score = 0, qIdx = 0, isAnswering = false;

        function save() { localStorage.setItem('arabic_academy_v100_final', JSON.stringify(userProgress)); }

        function initApp() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            showDashboard();
        }

        function showDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('lesson-view').classList.add('hidden');
            document.getElementById('quiz-box').style.display = 'none';
            const list = document.getElementById('module-list');
            list.innerHTML = "";
            courseData.forEach((lvl, i) => {
                const isUn = i <= userProgress.unlocked;
                const div = document.createElement('div');
                div.className = `module-card ${isUn ? 'unlocked' : 'locked'}`;
                div.innerHTML = `<h3>${lvl.title}</h3><p>${isUn ? 'Tap to Study' : '🔒 Locked'}</p>`;
                if(isUn) div.onclick = () => startLesson(i);
                list.appendChild(div);
            });
            document.getElementById('progress-fill').style.width = ((userProgress.unlocked+1)/courseData.length*100) + "%";
        }

        function startLesson(i) {
            currentLevel = i;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('lesson-view').classList.remove('hidden');
            document.getElementById('lesson-title').innerText = courseData[i].title;
            const vC = document.getElementById('vocab-container');
            const sC = document.getElementById('sentence-container');
            vC.innerHTML = "<h3>Vocabulary</h3>"; sC.innerHTML = "<h3>Sentences</h3>";
            courseData[i].words.forEach(w => {
                vC.innerHTML += `<div class="item-row"><div class="arabic-text">${w.a}</div><div class="pronunciation">Pronounced: ${w.p}</div><div class="translation">English: ${w.e}</div></div>`;
            });
            courseData[i].sentences.forEach(s => {
                sC.innerHTML += `<div class="item-row"><div class="arabic-text">${s.a}</div><div class="pronunciation">Pronounced: ${s.p}</div><div class="translation">English: ${s.e}</div></div>`;
            });
        }

        function startQuiz() {
            document.getElementById('lesson-view').classList.add('hidden');
            document.getElementById('quiz-box').style.display = 'block';
            quizPool = [...courseData[currentLevel].words, ...courseData[currentLevel].sentences];
            quizPool.sort(() => Math.random() - 0.5);
            score = 0; qIdx = 0;
            ask();
        }

        function ask() {
            if(qIdx >= quizPool.length) { finish(); return; }
            isAnswering = false;
            const item = quizPool[qIdx];
            document.getElementById('q-text').innerText = `Question ${qIdx+1}/${quizPool.length}:`;
            document.getElementById('q-display').innerText = item.a;
            const options = [item.e];
            const decoys = [...courseData[currentLevel].words, ...courseData[currentLevel].sentences].map(x => x.e).filter(x => x !== item.e);
            while(options.length < 4 && decoys.length > 0) {
                options.push(decoys.splice(Math.floor(Math.random()*decoys.length), 1)[0]);
            }
            options.sort(() => Math.random() - 0.5);
            const optDiv = document.getElementById('q-options');
            optDiv.innerHTML = "";
            options.forEach(o => {
                const b = document.createElement('button');
                b.className = "option-btn";
                b.innerText = o;
                b.onclick = () => checkAnswer(b, o, item.e);
                optDiv.appendChild(b);
            });
        }

        function checkAnswer(btn, selected, correct) {
            if(isAnswering) return;
            isAnswering = true;
            if(selected === correct) {
                btn.classList.add('correct');
                score++;
            } else {
                btn.classList.add('wrong');
                Array.from(document.getElementsByClassName('option-btn')).forEach(b => {
                    if(b.innerText === correct) b.classList.add('correct');
                });
            }
            setTimeout(() => { qIdx++; ask(); }, 1000);
        }

        function finish() {
            const pass = score === quizPool.length;
            const feedback = document.getElementById('q-feedback');
            document.getElementById('q-ui').classList.add('hidden');
            if(pass) {
                feedback.innerHTML = `<h2 style="color:green">${score}/${quizPool.length}! Perfect!</h2>`;
                if(currentLevel === userProgress.unlocked) { userProgress.unlocked++; save(); }
            } else {
                feedback.innerHTML = `<h2 style="color:red">${score}/${quizPool.length}</h2><p>100% required to pass.</p>`;
            }
            setTimeout(() => { feedback.innerHTML = ""; document.getElementById('q-ui').classList.remove('hidden'); showDashboard(); }, 3000);
        }
    </script>
</body>
</html>
