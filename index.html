<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Academy - All Levels Unlocked</title>
    <style>
        :root { --primary: #1a2a3a; --secondary: #27ae60; --accent: #d35400; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; color: var(--primary); }
        #welcome-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #2c3e50 0%, #000000 100%); color: white; text-align: center; }
        .btn-main { padding: 15px 50px; font-size: 1.2rem; border-radius: 8px; border: none; background: var(--secondary); color: white; cursor: pointer; transition: 0.3s; font-weight: bold; margin-top: 20px; }
        #main-app { display: none; padding: 20px; max-width: 800px; margin: auto; }
        .module-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .module-card { background: white; padding: 20px; border-radius: 12px; border-left: 10px solid var(--secondary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .card-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .pair-container { padding: 15px 0; border-bottom: 2px solid #f0f0f0; }
        .word-row { margin-bottom: 15px; text-align: right; }
        .sentence-row { border-right: 4px solid var(--accent); background: #fffcf9; padding: 15px; border-radius: 8px 0 0 8px; text-align: right; margin-top: 5px; }
        .arabic-text { font-size: 2.2rem; font-weight: bold; color: #000; direction: rtl; display: block; }
        .pronunciation { font-size: 0.9rem; color: var(--accent); font-style: italic; display: block; text-align: left; }
        .translation { font-size: 1.1rem; color: #444; font-weight: bold; display: block; text-align: left; }
        #quiz-box { display: none; background: white; padding: 30px; border-radius: 15px; text-align: center; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 1.1rem; background: white; }
        .correct { background-color: #2ecc71 !important; color: white !important; }
        .wrong { background-color: #e74c3c !important; color: white !important; }
        .hidden { display: none; }
        .back-link { cursor: pointer; color: var(--accent); margin-bottom: 20px; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

    <section id="welcome-screen">
        <h1>ARABIC ACADEMY</h1>
        <p>10 Levels • 100% Unlocked • 200 Items</p>
        <button class="btn-main" onclick="initApp()">EXPLORE LEVELS</button>
    </section>

    <main id="main-app">
        <div id="dashboard">
            <h2>Select a Level</h2>
            <div id="module-list" class="module-grid"></div>
        </div>

        <div id="lesson-view" class="hidden">
            <div class="back-link" onclick="showDashboard()">← Back to Dashboard</div>
            <h2 id="lesson-title"></h2>
            <div class="card-box" id="content-container"></div>
            <button class="btn-main" style="width:100%;" onclick="startQuiz()">TAKE THE QUIZ</button>
        </div>

        <div id="quiz-box">
            <h2 id="q-text">Question</h2>
            <div id="q-ui">
                <div id="q-display" class="arabic-text" style="text-align:center; margin:20px 0;"></div>
                <div id="q-options"></div>
            </div>
            <p id="q-feedback"></p>
        </div>
    </main>

                    {w:{a:"فُنْدُق", e:"Hotel", p:"Fun-duq"}, s:{a:"أَسْكُنُ فِي فُنْدُقٍ جَمِيل", e:"I stay in a beautiful hotel", p:"As-ku-nu fi fun-du-qin ja-mil"}}
                ]
            },

                pairs: [

                    {w:{a:"أَنْتَ", e:"You (m)", p:"An-ta"}, s:{a:"أَنْتَ صَدِيقِي الْمُفَضَّل", e:"You are my favorite friend", p:"An-ta sa-di-qil mu-fad-dal"}},
                    {w:{a:"أَنْتِ", e:"You (f)", p:"An-ti"}, s:{a:"أَنْتِ طَالِبَةٌ ذَكِيَّة", e:"You (f) are a smart student", p:"An-ti ta-li-ba-tun dha-kiy-yah"}},
                    {w:{a:"هُوَ", e:"He", p:"Hu-wa"}, s:{a:"هُوَ مُهَنْدِسٌ مَشْهُور", e:"He is a famous engineer", p:"Hu-wa mu-han-di-sun mash-hur"}},

                    {w:{a:"يَشْرَب", e:"Drink", p:"Yash-rab"}, s:{a:"هِيَ تَشْرَبُ الْعَصِير", e:"She drinks the juice", p:"Hi-ya tash-ra-bul a-sir"}},

                    {w:{a:"يَسْمَع", e:"Hear", p:"Yas-ma"}, s:{a:"أَسْمَعُ صَوْتَ الْأَذَان", e:"I hear the sound of Adhan", p:"As-ma-u saw-tal a-dhan"}},
                    {w:{a:"يَجْلِس", e:"Sit", p:"Yaj-lis"}, s:{a:"يَجْلِسُ الرَّجُلُ عَلَى الْكُرْسِيّ", e:"The man sits on the chair", p:"Yaj-li-sur ra-ju-lu a-lal kur-si"}},
                    {w:{a:"يَتَكَلَّم", e:"Speak", p:"Ya-ta-kal-lam"}, s:{a:"أَتَكَلَّمُ الْعَرَبِيَّةَ جَيِّدًا", e:"I speak Arabic well", p:"A-ta-kal-la-mul a-ra-biy-ya-ta jay-yi-dan"}}

            }
        ];

        function initApp() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            showDashboard();
        }

        function showDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('lesson-view').classList.add('hidden');
            document.getElementById('quiz-box').style.display = 'none';
            const list = document.getElementById('module-list');
            list.innerHTML = "";
            courseData.forEach((lvl, i) => {
                const div = document.createElement('div');
                div.className = "module-card";
                div.innerHTML = `<h3>${lvl.title}</h3><p>Open Access</p>`;
                div.onclick = () => startLesson(i);
                list.appendChild(div);
            });
        }

        function startLesson(i) {
            currentLevel = i;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('lesson-view').classList.remove('hidden');
            document.getElementById('lesson-title').innerText = courseData[i].title;
            const container = document.getElementById('content-container');
            container.innerHTML = "";
            courseData[i].pairs.forEach(pair => {
                container.innerHTML += `
                    <div class="pair-container">
                        <div class="word-row">
                            <span class="arabic-text">${pair.w.a}</span>
                            <span class="pronunciation">Word: ${pair.w.p}</span>
                            <span class="translation">${pair.w.e}</span>
                        </div>
                        <div class="sentence-row">
                            <span class="arabic-text" style="font-size:1.6rem;">${pair.s.a}</span>
                            <span class="pronunciation">Sentence: ${pair.s.p}</span>
                            <span class="translation">${pair.s.e}</span>
                        </div>
                    </div>`;
            });
        }

        let quizPool = [], score = 0, qIdx = 0, isAnswering = false;
        function startQuiz() {
            document.getElementById('lesson-view').classList.add('hidden');
            document.getElementById('quiz-box').style.display = 'block';
            quizPool = [];
            courseData[currentLevel].pairs.forEach(p => {
                quizPool.push({a: p.w.a, e: p.w.e});
                quizPool.push({a: p.s.a, e: p.s.e});
            });
            quizPool.sort(() => Math.random() - 0.5);
            score = 0; qIdx = 0;
            ask();
        }

        function ask() {
            if(qIdx >= quizPool.length) { finish(); return; }
            isAnswering = false;
            const item = quizPool[qIdx];
            document.getElementById('q-text').innerText = `Question ${qIdx+1}/${quizPool.length}`;
            document.getElementById('q-display').innerText = item.a;
            const options = [item.e];
            const decoys = courseData.flatMap(l => l.pairs.flatMap(p => [p.w.e, p.s.e])).filter(x => x !== item.e);
            while(options.length < 4) options.push(decoys.splice(Math.floor(Math.random()*decoys.length), 1)[0]);
            options.sort(() => Math.random() - 0.5);
            const optDiv = document.getElementById('q-options');
            optDiv.innerHTML = "";
            options.forEach(o => {
                const b = document.createElement('button');
                b.className = "option-btn";
                b.innerText = o;
                b.onclick = () => {
                    if(isAnswering) return;
                    isAnswering = true;
                    if(o === item.e) { b.classList.add('correct'); score++; }
                    else b.classList.add('wrong');
                    setTimeout(() => { qIdx++; ask(); }, 1000);
                };
                optDiv.appendChild(b);
            });
        }

        function finish() {
            const feedback = document.getElementById('q-feedback');
            feedback.innerHTML = `<h2>Quiz Complete! Score: ${score}/${quizPool.length}</h2>`;
            setTimeout(() => { feedback.innerHTML = ""; showDashboard(); }, 3000);
        }
    </script>
