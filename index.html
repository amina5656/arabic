<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arabic Academy: 3-Block Mastery</title>
    <style>
        :root { --primary: #1a2a3a; --success: #27ae60; --bg: #f4f7f6; --accent: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; text-align: center; color: var(--primary); }
        .screen { display: none; padding: 20px; min-height: 100vh; box-sizing: border-box; flex-direction: column; align-items: center; }
        .active { display: flex; }
        
        /* Welcome */
        #welcome-page { background: var(--primary); color: white; justify-content: center; }
        
        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; width: 100%; max-width: 900px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; cursor: pointer; border-top: 6px solid #bdc3c7; transition: 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card.completed { border-top-color: var(--success); background: #e8f8f0; }

        /* Level Hub Blocks */
        .block-container { display: flex; gap: 20px; margin-top: 50px; width: 100%; max-width: 800px; }
        .block { flex: 1; background: white; padding: 40px; border-radius: 15px; cursor: pointer; border-bottom: 8px solid #bdc3c7; transition: 0.3s; }
        .block:hover { transform: translateY(-5px); border-bottom-color: var(--accent); }
        .block.done { border-bottom-color: var(--success); }

        /* Study Area */
        .study-box { background: white; width: 100%; max-width: 600px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 30px; }
        .arabic { font-size: 3rem; font-weight: bold; margin: 30px 0; direction: rtl; }
        .eng { font-size: 1.5rem; color: #7f8c8d; margin-bottom: 20px; visibility: hidden; }
        .visible { visibility: visible; }
        input { width: 90%; padding: 15px; font-size: 1.3rem; border: 2px solid #ddd; border-radius: 8px; direction: rtl; text-align: center; }
        .btn { padding: 15px 30px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; }
    </style>
</head>
<body>

    <section id="welcome-page" class="screen active">
        <h1>WELCOME TO ARABIC ACADEMY</h1>
        <p>Advanced 100-Level Learning System</p>
        <button class="btn" style="width:auto; padding: 20px 50px; background:var(--success);" onclick="showScreen('lvl-select')">ENTER DASHBOARD</button>
    </section>

    <section id="lvl-select" class="screen">
        <h2>Select a Level</h2>
        <div id="main-grid" class="grid"></div>
    </section>

    <section id="lvl-hub" class="screen">
        <button class="btn" onclick="showScreen('lvl-select')" style="width:auto;">← Back to Map</button>
        <h2 id="hub-title"></h2>
        <div class="block-container">
            <div id="b-words" class="block" onclick="startSession('words')"><h3>📚 WORDS</h3><p>Read & Verify</p></div>
            <div id="b-sentences" class="block" onclick="startSession('sentences')"><h3>✍️ SENTENCES</h3><p>Context Practice</p></div>
            <div id="b-practice" class="block" onclick="startSession('practice')"><h3>⌨️ PRACTICE</h3><p>Typing Mastery</p></div>
        </div>
    </section>

    <section id="study-area" class="screen">
        <div class="study-box">
            <h3 id="study-title"></h3>
            <div id="disp-ara" class="arabic"></div>
            <div id="disp-eng" class="eng"></div>
            <div id="input-zone" style="display:none;"><input type="text" id="typer" placeholder="Type Arabic here..."></div>
            <button id="action-btn" class="btn" onclick="doAction()">SHOW ANSWER</button>
        </div>
    </section>

    <script>
        const data = {
            1: { topic: "Greetings", items: [
                { w: "مَرْحَبًا", s: "مَرْحَبًا بِكَ", e: "Hello / Welcome to you", p: "مَرْحَبًا بِكَ" },
                { w: "شُكْرًا", s: "شُكْرًا جَزِيلًا", e: "Thank you / Thanks a lot", p: "شُكْرًا جَزِيلًا" },
                // ... Imagine 10 items here
            ]}
        };

        let curLvl = 1; let curStep = 0; let curMode = ''; let show = false;
        let progress = JSON.parse(localStorage.getItem('amina_v3')) || {};

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'lvl-select') renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = '';
            for(let i=1; i<=100; i++) {
                const state = progress[i] || {};
                const isDone = (state.words && state.sentences && state.practice);
                grid.innerHTML += `<div class="card ${isDone?'completed':''}" onclick="openHub(${i})"><strong>Level ${i}</strong></div>`;
            }
        }

        function openHub(lvl) {
            curLvl = lvl;
            document.getElementById('hub-title').innerText = "Level " + lvl + " Mastery";
            const state = progress[lvl] || {};
            document.getElementById('b-words').className = 'block ' + (state.words?'done':'');
            document.getElementById('b-sentences').className = 'block ' + (state.sentences?'done':'');
            document.getElementById('b-practice').className = 'block ' + (state.practice?'done':'');
            showScreen('lvl-hub');
        }

        function startSession(mode) {
            curMode = mode; curStep = 0; show = false;
            document.getElementById('study-title').innerText = mode.toUpperCase();
            loadItem();
            showScreen('study-area');
        }

        function loadItem() {
            const item = data[curLvl].items[curStep];
            const ara = document.getElementById('disp-ara');
            const eng = document.getElementById('disp-eng');
            const zone = document.getElementById('input-zone');
            const btn = document.getElementById('action-btn');

            eng.classList.remove('visible'); show = false;
            if(curMode === 'words') { ara.innerText = item.w; eng.innerText = item.e; zone.style.display="none"; btn.innerText="SHOW ANSWER"; }
            else if(curMode === 'sentences') { ara.innerText = item.s; eng.innerText = item.e; zone.style.display="none"; btn.innerText="SHOW ANSWER"; }
            else { ara.innerText = item.p; zone.style.display="block"; document.getElementById('typer').value=""; btn.innerText="SUBMIT TYPING"; }
        }

        function doAction() {
            if(curMode === 'practice') {
                if(document.getElementById('typer').value === data[curLvl].items[curStep].p) next();
                else alert("Mismatch! Check spelling/harakaat.");
                return;
            }
            if(!show) { document.getElementById('disp-eng').classList.add('visible'); document.getElementById('action-btn').innerText="NEXT"; show=true; }
            else next();
        }

        function next() {
            if(curStep < data[curLvl].items.length - 1) { curStep++; loadItem(); }
            else { 
                if(!progress[curLvl]) progress[curLvl] = {};
                progress[curLvl][curMode] = true;
                localStorage.setItem('amina_v3', JSON.stringify(progress));
                alert(curMode.toUpperCase() + " Block Cleared!");
                openHub(curLvl);
            }
        }

        window.onload = renderGrid;
    </script>
</body>
</html>
