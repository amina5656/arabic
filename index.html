<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arabic Academy: Scroll & Quiz</title>
    <style>
        :root { --primary: #1a2a3a; --success: #27ae60; --bg: #f4f7f6; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--text); }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; align-items: center; }
        .active { display: flex; }
        
        /* Dashboard */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; width: 100%; max-width: 900px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; cursor: pointer; border-top: 6px solid #bdc3c7; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card.completed { border-top-color: var(--success); background: #e8f8f0; }

        /* Study List */
        .study-container { background: white; width: 100%; max-width: 700px; padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        h2 { border-bottom: 2px solid var(--primary); padding-bottom: 10px; color: var(--primary); }
        .row { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px solid #eee; }
        .ara { font-size: 1.8rem; font-weight: bold; direction: rtl; color: #000; }
        .eng { font-size: 1.1rem; color: #666; }

        /* Quiz Area */
        .quiz-box { background: white; width: 100%; max-width: 600px; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .q-display { font-size: 2.5rem; margin: 30px 0; font-weight: bold; direction: rtl; }
        .ans-display { font-size: 1.5rem; color: var(--success); margin-bottom: 20px; min-height: 1.6rem; }
        .btn { padding: 15px 30px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; font-size: 1.1rem; }
        .btn-quiz-start { background: var(--success); margin-top: 40px; padding: 25px; font-size: 1.3rem; }
    </style>
</head>
<body>

    <section id="welcome" class="screen active" style="justify-content:center; background: var(--primary); color:white; text-align:center;">
        <h1>AHALAN AMINA</h1>
        <p>10 Words • 10 Sentences • One Quiz</p>
        <button class="btn" style="width:auto; background:var(--success);" onclick="showScreen('lvl-select')">OPEN DASHBOARD</button>
    </section>

    <section id="lvl-select" class="screen">
        <h2>Select Level</h2>
        <div id="main-grid" class="grid"></div>
    </section>

    <section id="study-page" class="screen">
        <button class="btn" onclick="showScreen('lvl-select')" style="width:auto; margin-bottom:20px;">← Back</button>
        <div class="study-container">
            <h1 id="lvl-title" style="text-align:center;"></h1>
            
            <h2>📚 Vocabulary (10 Words)</h2>
            <div id="words-list"></div>

            <h2 style="margin-top:40px;">✍️ Sentences (10 Phrases)</h2>
            <div id="sentences-list"></div>

            <button class="btn btn-quiz-start" onclick="startQuiz()">I'VE READ THEM ALL - START QUIZ</button>
        </div>
    </section>

    <section id="quiz-page" class="screen">
        <div class="quiz-box">
            <h2 id="quiz-header">Level Quiz</h2>
            <p id="quiz-progress"></p>
            <div id="q-text" class="q-display"></div>
            <div id="a-text" class="ans-display"></div>
            <button id="quiz-btn" class="btn" onclick="handleQuizAction()">SHOW ANSWER</button>
        </div>
    </section>

    <script>
        const levelData = {
            1: {
                topic: "Greetings & Basics",
                words: [
                    { a: "مَرْحَبًا", e: "Hello" }, { a: "أَهْلًا", e: "Welcome" }, { a: "شُكْرًا", e: "Thanks" },
                    { a: "كَيْفَ", e: "How" }, { a: "بِخَيْر", e: "Good/Fine" }, { a: "نَعَم", e: "Yes" },
                    { a: "لَا", e: "No" }, { a: "أَيْنَ", e: "Where" }, { a: "مَنْ", e: "Who" }, { a: "أَنَا", e: "I am" }
                ],
                sentences: [
                    { a: "مَرْحَبًا بِكَ يَا صَدِيقِي", e: "Hello to you my friend" },
                    { a: "أَهْلًا وَسَهْلًا فِي بَيْتِي", e: "Welcome to my house" },
                    { a: "شُكْرًا جَزِيلًا عَلَى الْمُسَاعَدَة", e: "Thank you very much for the help" },
                    { a: "كَيْفَ حَالُكَ الْيَوْم؟", e: "How are you today?" },
                    { a: "أَنَا بِخَيْر وَالْحَمْدُ لِلَّه", e: "I am fine, praise be to God" },
                    { a: "نَعَم أَنَا أَتَحَدَّثُ الْعَرَبِيَّة", e: "Yes, I speak Arabic" },
                    { a: "لَا لَسْتُ جَائِعًا الآن", e: "No, I am not hungry now" },
                    { a: "أَيْنَ مَكْتَبُكَ الْجَدِيد؟", e: "Where is your new office?" },
                    { a: "مَنْ أَنْتَ يَا أَخِي؟", e: "Who are you, brother?" },
                    { a: "أَنَا مُهَنْدِسَةُ بَيَانَات", e: "I am a Data Engineer" }
                ]
            }
        };

        let curLvl = 1; let curQ = 0; let showingAns = false; let quizPool = [];
        let progress = JSON.parse(localStorage.getItem('amina_scroll_v1')) || {};

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
            if(id === 'lvl-select') renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = '';
            for(let i=1; i<=100; i++) {
                grid.innerHTML += `<div class="card ${progress[i]?'completed':''}" onclick="loadLevel(${i})"><strong>Level ${i}</strong></div>`;
            }
        }

        function loadLevel(lvl) {
            if(!levelData[lvl]) return alert("Data for this level is not yet added.");
            curLvl = lvl;
            document.getElementById('lvl-title').innerText = `Level ${lvl}: ${levelData[lvl].topic}`;
            
            const wList = document.getElementById('words-list');
            const sList = document.getElementById('sentences-list');
            wList.innerHTML = ''; sList.innerHTML = '';

            levelData[lvl].words.forEach(item => {
                wList.innerHTML += `<div class="row"><span class="eng">${item.e}</span><span class="ara">${item.a}</span></div>`;
            });
            levelData[lvl].sentences.forEach(item => {
                sList.innerHTML += `<div class="row"><span class="eng">${item.e}</span><span class="ara">${item.a}</span></div>`;
            });

            showScreen('study-page');
        }

        function startQuiz() {
            // Combine words and sentences into one quiz pool of 20 items
            quizPool = [...levelData[curLvl].words, ...levelData[curLvl].sentences];
            // Shuffle the pool
            quizPool.sort(() => Math.random() - 0.5);
            curQ = 0;
            showingAns = false;
            showScreen('quiz-page');
            updateQuizUI();
        }

        function updateQuizUI() {
            const item = quizPool[curQ];
            document.getElementById('quiz-progress').innerText = `Question ${curQ + 1} of 20`;
            document.getElementById('q-text').innerText = item.a;
            document.getElementById('a-text').innerText = "";
            document.getElementById('quiz-btn').innerText = "SHOW ANSWER";
            showingAns = false;
        }

        function handleQuizAction() {
            if(!showingAns) {
                document.getElementById('a-text').innerText = quizPool[curQ].e;
                document.getElementById('quiz-btn').innerText = "NEXT QUESTION";
                showingAns = true;
            } else {
                if(curQ < quizPool.length - 1) {
                    curQ++;
                    updateQuizUI();
                } else {
                    alert("🎉 Level " + curLvl + " Complete!");
                    progress[curLvl] = true;
                    localStorage.setItem('amina_scroll_v1', JSON.stringify(progress));
                    showScreen('lvl-select');
                }
            }
        }

        window.onload = renderGrid;
    </script>
</body>
</html>
