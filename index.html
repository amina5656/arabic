<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Academy - 10x10 Mastery</title>
    <style>
        :root { 
            --primary: #1a2a3a; --secondary: #27ae60; --accent: #d35400; 
            --bg: #f4f7f6; --grey: #bdc3c7; --amber: #f39c12; --red: #e74c3c; 
        }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; color: var(--primary); }
        #welcome-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #2c3e50 0%, #000000 100%); color: white; text-align: center; }
        .btn-main { padding: 15px 50px; font-size: 1.2rem; border-radius: 8px; border: none; background: var(--secondary); color: white; cursor: pointer; transition: 0.3s; font-weight: bold; margin-top: 20px; }
        #main-app { display: none; padding: 20px; max-width: 800px; margin: auto; }
        
        .module-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .module-card { background: white; padding: 20px; border-radius: 12px; border-left: 12px solid var(--grey); box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; }
        .module-card:hover { transform: translateY(-2px); }
        
        /* Status Colors */
        .status-completed { border-left-color: var(--secondary) !important; }
        .status-started { border-left-color: var(--amber) !important; }
        .status-failed { border-left-color: var(--red) !important; }
        .status-never { border-left-color: var(--grey) !important; }

        .card-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .pair-container { padding: 15px 0; border-bottom: 2px solid #f0f0f0; }
        .word-row { margin-bottom: 15px; text-align: right; }
        .sentence-row { border-right: 4px solid var(--accent); background: #fffcf9; padding: 15px; border-radius: 8px 0 0 8px; text-align: right; margin-top: 5px; }
        .arabic-text { font-size: 2.2rem; font-weight: bold; color: #000; direction: rtl; display: block; }
        .pronunciation { font-size: 0.9rem; color: var(--accent); font-style: italic; display: block; text-align: left; }
        .translation { font-size: 1.1rem; color: #444; font-weight: bold; display: block; text-align: left; }
        
        #quiz-box { display: none; background: white; padding: 30px; border-radius: 15px; text-align: center; min-height: 400px; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 1.1rem; background: white; transition: 0.2s; }
        .correct { background-color: var(--secondary) !important; color: white !important; border-color: var(--secondary) !important; }
        .wrong { background-color: var(--red) !important; color: white !important; border-color: var(--red) !important; }
        .hidden { display: none; }
        .back-link { cursor: pointer; color: var(--accent); margin-bottom: 20px; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

    <section id="welcome-screen">
        <h1>ARABIC ACADEMY</h1>
        <p>10 Levels • 200 Lessons • Open Access</p>
        <button class="btn-main" onclick="initApp()">START LEARNING</button>
    </section>

    <main id="main-app">
        <div id="dashboard">
            <h2>Course Progress</h2>
            <div id="module-list" class="module-grid"></div>
        </div>

        <div id="lesson-view" class="hidden">
            <div class="back-link" onclick="showDashboard()">← Back to Dashboard</div>
            <h2 id="lesson-title"></h2>
            <div class="card-box" id="content-container"></div>
            <button class="btn-main" style="width:100%; margin-bottom: 40px;" onclick="startQuiz()">TAKE THE QUIZ</button>
        </div>

        <div id="quiz-box">
            <h2 id="q-text">Question</h2>
            <div id="q-ui">
                <div id="q-display" class="arabic-text" style="text-align:center; margin:30px 0;"></div>
                <div id="q-options"></div>
            </div>
            <p id="q-feedback" style="font-weight: bold; font-size: 1.2rem;"></p>
        </div>
    </main>

                {w:{a:"شَاي", e:"Tea", p:"Shay"}, s:{a:"أُحِبُّ الشَّايَ مَعَ النَّعْنَاع", e:"I love tea with mint", p:"U-hib-bush sha-ya ma-an na-na"}},
                {w:{a:"لَحْم", e:"Meat", p:"Lahm"}, s:{a:"نَأْكُلُ اللَّحْمَ فِي الْغَدَاء", e:"We eat meat at lunch", p:"Na-ku-lul lah-ma fil gha-da"}},
                {w:{a:"أَرُزّ", e:"Rice", p:"A-ruzz"}, s:{a:"الْأَرُزُّ طَعَامٌ أَسَاسِيّ", e:"Rice is a basic food", p:"Al-a-ruz-zu ta-a-mun a-sa-si"}},
                {w:{a:"خُضَار", e:"Vegetables", p:"Khu-dar"}, s:{a:"الْخُضَارُ طَازِجَةٌ وَصِحِّيَّة", e:"The vegetables are fresh and healthy", p:"Al-khu-da-ru ta-zi-ja-tun wa sih-hiy-yah"}},
                {w:{a:"فَاكِهَة", e:"Fruit", p:"Fa-ki-hah"}, s:{a:"الْفَاكِهَةُ حُلْوَةُ الْمَذَاق", e:"The fruit is sweet in taste", p:"Al-fa-ki-ha-tu hul-wa-tul ma-dhaq"}},
                {w:{a:"سُكَّر", e:"Sugar", p:"Suk-kar"}, s:{a:"السُّكَّرُ كَثِيرٌ فِي هَذَا", e:"The sugar is too much in this", p:"As-suk-ka-ru ka-thi-run fi ha-dha"}}
            ]},
            { id: 7, title: "Level 8: Places", pairs: [
                {w:{a:"سُوق", e:"Market", p:"Suq"}, s:{a:"أَذْهَبُ إِلَى السُّوقِ لِلتَّسَوُّق", e:"I go to the market for shopping", p:"Adh-ha-bu i-las su-qi lit ta-saw-wuq"}},
                {w:{a:"مَدْرَسَة", e:"School", p:"Mad-ra-sah"}, s:{a:"الْمَدْرَسَةُ بَعِيدَةٌ عَنْ هُنَا", e:"The school is far from here", p:"Al-mad-ra-sa-tu ba-i-da-tun an hu-na"}},
                {w:{a:"مَسْجِد", e:"Mosque", p:"Mas-jid"}, s:{a:"أُصَلِّي فِي الْمَسْجِدِ الْكَبِير", e:"I pray in the big mosque", p:"U-sal-li fil mas-ji-dil ka-bir"}},
                {w:{a:"مُسْتَشْفَى", e:"Hospital", p:"Mus-tash-fa"}, s:{a:"الطَّبِيبُ يَعْمَلُ فِي الْمُسْتَشْفَى", e:"The doctor works in the hospital", p:"At-ta-bi-bu ya-ma-lu fil mus-tash-fa"}},
                {w:{a:"مَطْعَم", e:"Restaurant", p:"Mat-am"}, s:{a:"نَأْكُلُ الْعَشَاءَ فِي الْمَطْعَم", e:"We eat dinner at the restaurant", p:"Na-ku-lul a-sha-a fil mat-am"}},
                {w:{a:"مَدِينَة", e:"City", p:"Ma-di-nah"}, s:{a:"الْمَدِينَةُ مُزْدَحِمَةٌ دَائِمًا", e:"The city is always crowded", p:"Al-ma-di-na-tu muz-da-hi-ma-tun da-i-man"}},
                {w:{a:"قَرْيَة", e:"Village", p:"Qar-yah"}, s:{a:"الْقَرْيَةُ هَادِئَةٌ وَجَمِيلَة", e:"The village is quiet and beautiful", p:"Al-qar-ya-tu ha-di-a-tun wa ja-mi-lah"}},
                {w:{a:"شَارِع", e:"Street", p:"Sha-ri"}, s:{a:"هَذَا الشَّارِعُ طَوِيلٌ جِدًّا", e:"This street is very long", p:"Ha-dhash sha-ri-u ta-wi-lun jid-dan"}},
                {w:{a:"مَطَار", e:"Airport", p:"Ma-tar"}, s:{a:"أَذْهَبُ إِلَى الْمَطَارِ لِلسَّفَر", e:"I go to the airport for travel", p:"Adh-ha-bu i-lal ma-ta-ri lis sa-far"}},
                {w:{a:"مَكْتَب", e:"Office", p:"Mak-tab"}, s:{a:"أَعْمَلُ فِي مَكْتَبٍ كَبِير", e:"I work in a big office", p:"A-ma-lu fi mak-ta-bin ka-bir"}}
            ]},
            { id: 8, title: "Level 9: Pronouns", pairs: [
                {w:{a:"أَنَا", e:"I", p:"A-na"}, s:{a:"أَنَا أَتَعَلَّمُ الْعَرَبِيَّة", e:"I am learning Arabic", p:"A-na a-ta-al-la-mul a-ra-biy-yah"}},
                {w:{a:"أَنْتَ", e:"You (Male)", p:"An-ta"}, s:{a:"أَنْتَ صَدِيقٌ وَفِيّ", e:"You are a loyal friend", p:"An-ta sa-di-qun wa-fi"}},
                {w:{a:"أَنْتِ", e:"You (Female)", p:"An-ti"}, s:{a:"أَنْتِ طَالِبَةٌ مُجْتَهِدَة", e:"You are a hardworking student", p:"An-ti ta-li-ba-tun muj-ta-hi-dah"}},
                {w:{a:"هُوَ", e:"He", p:"Hu-wa"}, s:{a:"هُوَ يَقْرَأُ كِتَابًا مُفِيدًا", e:"He is reading a useful book", p:"Hu-wa yaq-ra-u ki-ta-ban mu-fi-dan"}},
                {w:{a:"هِيَ", e:"She", p:"Hi-ya"}, s:{a:"هِيَ تَكْتُبُ رِسَالَةً طَوِيلَة", e:"She is writing a long letter", p:"Hi-ya tak-tu-bu ri-sa-la-tan ta-wi-lah"}},
                {w:{a:"نَحْنُ", e:"We", p:"Nah-nu"}, s:{a:"نَحْنُ نُسَافِرُ غَدًا", e:"We are traveling tomorrow", p:"Nah-nu nu-sa-fi-ru gha-dan"}},
                {w:{a:"أَنْتُمْ", e:"You (Plural)", p:"An-tum"}, s:{a:"أَنْتُمْ طُلَّابٌ مَاهِرُون", e:"You are skilled students", p:"An-tum tul-la-bun ma-hi-run"}},
                {w:{a:"هُمْ", e:"They", p:"Hum"}, s:{a:"هُمْ يَلْعَبُونَ فِي النَّادِي", e:"They are playing at the club", p:"Hum yal-a-bu-na fin na-di"}},
                {w:{a:"هَذَا", e:"This (Male)", p:"Ha-dha"}, s:{a:"هَذَا هُوَ الْكِتَابُ", e:"This is the book", p:"Ha-dha hu-wal ki-tab"}},
                {w:{a:"هَذِهِ", e:"This (Female)", p:"Ha-dhi-hi"}, s:{a:"هَذِهِ هِيَ السَّيَّارَة", e:"This is the car", p:"Ha-dhi-hi hi-yas say-ya-rah"}}
            ]},
            { id: 9, title: "Level 10: Simple Verbs", pairs: [
                {w:{a:"يَأْكُل", e:"To Eat", p:"Ya-kul"}, s:{a:"الْوَلَدُ يَأْكُلُ التُّفَّاحَة", e:"The boy is eating the apple", p:"Al-wa-la-du ya-ku-lut tuf-fa-hah"}},
                {w:{a:"يَشْرَب", e:"To Drink", p:"Yash-rab"}, s:{a:"الرَّجُلُ يَشْرَبُ الْقَهْوَة", e:"The man is drinking the coffee", p:"Ar-ra-ju-lu yash-ra-bul qah-wah"}},
                {w:{a:"يَقْرَأ", e:"To Read", p:"Yaq-ra'"}, s:{a:"أَقْرَأُ الْقُرْآنَ كُلَّ يَوْم", e:"I read the Quran every day", p:"Aq-ra-ul Qur-a-na kul-la yawm"}},
                {w:{a:"يَكْتُب", e:"To Write", p:"Yak-tub"}, s:{a:"الْبِنْتُ تَكْتُبُ الْوَاجِب", e:"The girl is writing the homework", p:"Al-bin-tu tak-tu-bul wa-jib"}},
                {w:{a:"يَذْهَب", e:"To Go", p:"Yadh-hab"}, s:{a:"يَذْهَبُ الأَبُ إِلَى الْعَمَل", e:"The father goes to work", p:"Yadh-ha-bul a-bu i-lal a-mal"}},
                {w:{a:"يَرْجِع", e:"To Return", p:"Yar-ji"}, s:{a:"أَرْجِعُ مِنَ الْمَدْرَسَةِ عَصْرًا", e:"I return from school in the afternoon", p:"Ar-ji-u mi-nal mad-ra-sa-ti as-ran"}},
                {w:{a:"يَنَام", e:"To Sleep", p:"Ya-nam"}, s:{a:"يَنَامُ الطِّفْلُ مُبَكِّرًا", e:"The baby sleeps early", p:"Ya-na-mut tif-lu mu-bak-ki-ran"}},
                {w:{a:"يَسْتَيْقِظ", e:"To Wake up", p:"Yas-tay-qiz"}, s:{a:"أَسْتَيْقِظُ عِنْدَ الْفَجْر", e:"I wake up at Fajr", p:"Yas-tay-qi-zu in-dal fajr"}},
                {w:{a:"يَلْعَب", e:"To Play", p:"Yal-ab"}, s:{a:"يَلْعَبُ الْأَوْلَادُ بِالْكُرَة", e:"The boys are playing with the ball", p:"Yal-a-bul aw-la-du bil ku-rah"}},
                {w:{a:"يَعْمَل", e:"To Work", p:"Ya-mal"}, s:{a:"الْمُهَنْدِسُ يَعْمَلُ بِجِدّ", e:"The engineer works hard", p:"Al-mu-han-di-su ya-ma-lu bi-jidd"}}
            ]}
        ];

        let levelStatus = JSON.parse(localStorage.getItem('arabic_status_map')) || {};
        let currentLevel = 0;

        function saveStatus() { localStorage.setItem('arabic_status_map', JSON.stringify(levelStatus)); }

        function initApp() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            showDashboard();
        }

        function showDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('lesson-view').classList.add('hidden');
            document.getElementById('quiz-box').style.display = 'none';
            const list = document.getElementById('module-list');
            list.innerHTML = "";
            
            courseData.forEach((lvl, i) => {
                const status = levelStatus[i] || "never";
                const div = document.createElement('div');
                div.className = `module-card status-${status}`;
                
                let label = "Never Started";
                if(status === "started") label = "In Progress";
                if(status === "completed") label = "Completed";
                if(status === "failed") label = "Quiz Failed";

                div.innerHTML = `<h3>${lvl.title}</h3><p>${label}</p>`;
                div.onclick = () => startLesson(i);
                list.appendChild(div);
            });
        }

        function startLesson(i) {
            currentLevel = i;
            if(!levelStatus[i] || levelStatus[i] === "never") {
                levelStatus[i] = "started";
                saveStatus();
            }

            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('lesson-view').classList.remove('hidden');
            document.getElementById('lesson-title').innerText = courseData[i].title;
            
            const container = document.getElementById('content-container');
            container.innerHTML = "";
            courseData[i].pairs.forEach(pair => {
                container.innerHTML += `
                    <div class="pair-container">
                        <div class="word-row">
                            <span class="arabic-text">${pair.w.a}</span>
                            <span class="pronunciation">Word: ${pair.w.p}</span>
                            <span class="translation">${pair.w.e}</span>
                        </div>
                        <div class="sentence-row">
                            <span class="arabic-text" style="font-size:1.6rem;">${pair.s.a}</span>
                            <span class="pronunciation">Sentence: ${pair.s.p}</span>
                            <span class="translation">${pair.s.e}</span>
                        </div>
                    </div>`;
            });
            window.scrollTo(0,0);
        }

        let quizPool = [], score = 0, qIdx = 0, isAnswering = false;

        function startQuiz() {
            document.getElementById('lesson-view').classList.add('hidden');
            document.getElementById('quiz-box').style.display = 'block';
            quizPool = [];
            // Add all words and sentences from the current level to the quiz
            courseData[currentLevel].pairs.forEach(p => {
                quizPool.push({a: p.w.a, e: p.w.e});
                quizPool.push({a: p.s.a, e: p.s.e});
            });
            quizPool.sort(() => Math.random() - 0.5);
            score = 0; qIdx = 0;
            ask();
        }

        function ask() {
            if(qIdx >= quizPool.length) { finishQuiz(); return; }
            isAnswering = false;
            const item = quizPool[qIdx];
            document.getElementById('q-text').innerText = `Question ${qIdx+1}/${quizPool.length}`;
            document.getElementById('q-display').innerText = item.a;
            document.getElementById('q-feedback').innerText = "";
            
            // Create options
            const options = [item.e];
            const decoys = courseData.flatMap(l => l.pairs.flatMap(p => [p.w.e, p.s.e])).filter(x => x !== item.e);
            while(options.length < 4) {
                let d = decoys.splice(Math.floor(Math.random()*decoys.length), 1)[0];
                if(!options.includes(d)) options.push(d);
            }
            options.sort(() => Math.random() - 0.5);
            
            const optDiv = document.getElementById('q-options');
            optDiv.innerHTML = "";
            options.forEach(o => {
                const b = document.createElement('button');
                b.className = "option-btn";
                b.innerText = o;
                b.onclick = () => {
                    if(isAnswering) return;
                    isAnswering = true;
                    if(o === item.e) {
                        b.classList.add('correct');
                        score++;
                    } else {
                        b.classList.add('wrong');
                        // Highlight the correct one
                        Array.from(optDiv.children).forEach(btn => {
                            if(btn.innerText === item.e) btn.classList.add('correct');
                        });
                    }
                    setTimeout(() => { qIdx++; ask(); }, 1200);
                };
                optDiv.appendChild(b);
            });
        }

        function finishQuiz() {
            const passed = (score === quizPool.length);
            levelStatus[currentLevel] = passed ? "completed" : "failed";
            saveStatus();
            
            const feedback = document.getElementById('q-feedback');
            if(passed) {
                feedback.innerHTML = `<span style="color:var(--secondary)">PERFECT! 100% Score! Level Completed.</span>`;
            } else {
                feedback.innerHTML = `<span style="color:var(--red)">Score: ${score}/${quizPool.length}. Review and try again for Green status!</span>`;
            }
            
            setTimeout(() => { 
                feedback.innerHTML = ""; 
                showDashboard(); 
                window.scrollTo(0,0);
            }, 3000);
        }
    </script>
</body>
