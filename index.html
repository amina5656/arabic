<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Academy: Amina's Quest</title>
    <style>
        :root { --primary: #1a2a3a; --success: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; --text: #333; --accent: #2980b9; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; color: var(--text); line-height: 1.6; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; align-items: center; box-sizing: border-box; }
        .active { display: flex; }
        
        /* Dashboard / Map */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; width: 100%; max-width: 1100px; margin-top: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; cursor: pointer; border-top: 8px solid #bdc3c7; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .card h3 { margin: 0; color: #7f8c8d; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }
        .card p { margin: 10px 0 0 0; font-weight: bold; font-size: 1.2rem; color: var(--primary); }
        .card.completed { border-top-color: var(--success); background: #e8f8f0; }

        /* Study Table */
        .study-container { background: white; width: 100%; max-width: 900px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-top: 20px; }
        .row { display: grid; grid-template-columns: 1fr 1fr 1fr; align-items: center; padding: 18px 10px; border-bottom: 1px solid #eee; text-align: center; }
        .header-row { font-weight: bold; border-bottom: 3px solid var(--primary); background: #f9f9f9; border-radius: 10px 10px 0 0; }
        .ara { font-size: 2rem; font-weight: bold; direction: rtl; color: #000; }
        .pron { font-style: italic; color: var(--accent); font-size: 1.1rem; }
        .eng { font-size: 1.1rem; color: #555; font-weight: 500; }

        /* MCQ Quiz */
        .quiz-box { background: white; width: 100%; max-width: 650px; padding: 40px; border-radius: 25px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.12); }
        .q-display { font-size: 3rem; margin: 15px 0; font-weight: bold; direction: rtl; }
        .p-display { font-style: italic; color: var(--accent); margin-bottom: 30px; font-size: 1.3rem; }
        .options-grid { display: grid; gap: 15px; width: 100%; margin-top: 20px; }
        .option-btn { padding: 20px; border: 2px solid #dfe6e9; border-radius: 12px; background: white; cursor: pointer; font-size: 1.15rem; transition: 0.2s; font-weight: 500; }
        .option-btn:hover { border-color: var(--accent); background: #f0f7ff; }
        
        .correct { background: var(--success) !important; color: white !important; border-color: var(--success) !important; }
        .wrong { background: var(--error) !important; color: white !important; border-color: var(--error) !important; }

        /* Buttons */
        .btn { padding: 18px 35px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .btn:hover { opacity: 0.9; }
        .btn-quiz-start { background: var(--success); margin-top: 40px; width: 100%; font-size: 1.4rem; padding: 25px; }
    </style>
</head>
<body>

    <section id="welcome" class="screen active" style="justify-content:center; background: linear-gradient(135deg, #1a2a3a 0%, #2c3e50 100%); color:white; text-align:center;">
        <h1 style="font-size: 3rem; margin-bottom: 10px;">AHALAN AMINA</h1>
        <p style="font-size: 1.2rem; opacity: 0.8; margin-bottom: 30px;">100 Levels of Arabic Mastery</p>
        <button class="btn" style="background:var(--success); padding: 20px 60px;" onclick="showScreen('lvl-select')">START LEARNING</button>
    </section>

    <section id="lvl-select" class="screen">
        <h1 style="color: var(--primary);">Learning Map</h1>
        <div id="main-grid" class="grid"></div>
    </section>

    <section id="study-page" class="screen">
        <div style="width:100%; max-width:900px;">
            <button class="btn" onclick="showScreen('lvl-select')" style="background:#7f8c8d; padding: 10px 25px;">← Back to Map</button>
        </div>
        <div class="study-container">
            <h1 id="lvl-title" style="text-align:center; color: var(--primary); margin-bottom: 30px;"></h1>
            <div class="row header-row">
                <span>English Meaning</span><span>Pronunciation</span><span>Arabic Script</span>
            </div>
            <div id="full-list"></div>
            <button class="btn btn-quiz-start" onclick="startQuiz()">START THE QUEST</button>
        </div>
    </section>

    <section id="quiz-page" class="screen">
        <div class="quiz-box">
            <p id="quiz-progress" style="color: #95a5a6; font-weight: bold;"></p>
            <div id="q-text" class="q-display"></div>
            <div id="p-text" class="p-display"></div>
            <div id="options" class="options-grid"></div>
            <button id="next-btn" class="btn" style="display:none; margin-top:30px; background: var(--accent);" onclick="nextQuestion()">CONTINUE</button>
        </div>
    </section>

                ]
            },
            9: {
                topic: "Work & Office (الْعَمَل)",
                items: [
                    { a: "مَكْتَب", p: "Mak-tab", e: "Office" }, { a: "شَرِكَة", p: "Sha-ri-kah", e: "Company" }, { a: "مُدِير", p: "Mu-deer", e: "Manager" }, { a: "اجْتِمَاع", p: "Ij-ti-maa", e: "Meeting" }, { a: "هَاتِف", p: "Haa-tif", e: "Phone" }, { a: "حَاسُوب", p: "Haa-soob", e: "Computer" }, { a: "بَرِيد", p: "Ba-reed", e: "Email" }, { a: "مَلَف", p: "Ma-laf", e: "File" }, { a: "رَاتِب", p: "Raa-tib", e: "Salary" }, { a: "مُهَنْدِس", p: "Mu-han-dis", e: "Engineer" },
                    { a: "أَنَا فِي الشَّرِكَةِ الآن", p: "Ana feel sharikati al-aan", e: "I am at the company now" }, { a: "الْمُدِيرُ فِي اجْتِمَاع", p: "Al-mudeeru fee ijtimaa'", e: "The manager is in a meeting" }, { a: "أَيْنَ الْحَاسُوبُ الْجَدِيد؟", p: "Ayna al-haasoobu al-jadeed?", e: "Where is the new computer?" }, { a: "أُرْسِلُ لَكَ بَرِيدًا الإلِكْتُرُونِيًّا", p: "Ursilu laka bareedan ilikturoniyyan", e: "I will send you an email" }, { a: "اجْتِمَاعُنَا السَّاعَةَ التَّاسِعَة", p: "Ijtimaa'una as-saa'ata at-taasi'ah", e: "Our meeting is at nine o'clock" }, { a: "أَنَا أَعْمَلُ كَمُهَنْدِسَة", p: "Ana a'malu kamuhandisah", e: "I work as an engineer" }, { a: "هَذَا الْمَلَفُّ مُهِمٌّ جِدًّا", p: "Haadhal malaffu muhimmun jiddan", e: "This file is very important" }, { a: "هَاتِفِي لَا يَعْمَل", p: "Haatifee laa ya'mal", e: "My phone is not working" }, { a: "كَيْفَ كَانَ يَوْمُكَ فِي الْعَمَل؟", p: "Kayfa kaana yawmuka feel amal?", e: "How was your day at work?" }, { a: "أَحْتَاجُ إِلَى مَكْتَبٍ كَبِير", p: "Ahtaaju ila maktabin kabeer", e: "I need a large desk" }
                ]
            },
            10: {
                topic: "Places & Cities (الْأَمَاكِن)",
                items: [
                    { a: "مَدِينَة", p: "Ma-dee-nah", e: "City" }, { a: "دَوْلَة", p: "Daw-lah", e: "Country" }, { a: "مَطَار", p: "Ma-taar", e: "Airport" }, { a: "فُنْدُق", p: "Fun-duq", e: "Hotel" }, { a: "سُوق", p: "Sooq", e: "Market" }, { a: "مُسْتَشْفَى", p: "Mus-tash-fa", e: "Hospital" }, { a: "مَدْرَسَة", p: "Mad-ra-sah", e: "School" }, { a: "شَارِع", p: "Shaa-ri-a", e: "Street" }, { a: "مَطْعَم", p: "Mat-am", e: "Restaurant" }, { a: "مَحَطَّة", p: "Ma-hat-tah", e: "Station" },

                ]
            }
        };

        let curLvl = 1; let curQ = 0; let quizPool = [];
        let progress = JSON.parse(localStorage.getItem('amina_quest_v1')) || {};

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
            if(id === 'lvl-select') renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            for(let i=1; i<=10; i++) {
                const info = levelData[i] || { topic: "Locked Level" };
                grid.innerHTML += `
                    <div class="card ${progress[i]?'completed':''}" onclick="loadLevel(${i})">
                        <h3>Level ${i}</h3>
                        <p>${info.topic}</p>
                    </div>`;
            }
        }

        function loadLevel(lvl) {
            if(!levelData[lvl]) return;
            curLvl = lvl;
            document.getElementById('lvl-title').innerText = `Level ${lvl}: ${levelData[lvl].topic}`;
            const list = document.getElementById('full-list');
            list.innerHTML = '';
            levelData[lvl].items.forEach(item => {
                list.innerHTML += `
                    <div class="row">
                        <span class="eng">${item.e}</span>
                        <span class="pron">${item.p}</span>
                        <span class="ara">${item.a}</span>
                    </div>`;
            });
            showScreen('study-page');
        }

        function startQuiz() {
            // SHUFFLE POOL - NO REPEATS
            quizPool = [...levelData[curLvl].items].sort(() => Math.random() - 0.5);
            curQ = 0;
            showScreen('quiz-page');
            loadQuestion();
        }

        function loadQuestion() {
            const item = quizPool[curQ];
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('quiz-progress').innerText = `Item ${curQ + 1} of ${quizPool.length}`;
            document.getElementById('q-text').innerText = item.a;
            document.getElementById('p-text').innerText = item.p;

            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            let choices = [item.e];
            while(choices.length < 4) {
                let randomItem = levelData[curLvl].items[Math.floor(Math.random() * levelData[curLvl].items.length)].e;
                if(!choices.includes(randomItem)) choices.push(randomItem);
            }
            choices.sort(() => Math.random() - 0.5);

            choices.forEach(choice => {
                const b = document.createElement('button');
                b.className = 'option-btn';
                b.innerText = choice;
                b.onclick = () => {
                    const btns = document.querySelectorAll('.option-btn');
                    btns.forEach(btn => {
                        btn.onclick = null; // Disable after click
                        if(btn.innerText === item.e) btn.classList.add('correct');
                        else if(btn.innerText === choice) btn.classList.add('wrong');
                    });
                    document.getElementById('next-btn').style.display = "block";
                };
                optionsDiv.appendChild(b);
            });
        }

        function nextQuestion() {
            if(curQ < quizPool.length - 1) {
                curQ++; loadQuestion();
            } else {
                alert("Mabrook Amina! Level Complete.");
                progress[curLvl] = true;
                localStorage.setItem('amina_quest_v1', JSON.stringify(progress));
                showScreen('lvl-select');
            }
        }

        window.onload = renderGrid;
    </script>
</body>
