<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Academy - Pro</title>
    <style>
        :root { 
            --primary: #1a2a3a; --secondary: #27ae60; --accent: #d35400; 
            --bg: #f4f7f6; --grey: #bdc3c7; --amber: #f39c12; --red: #e74c3c; --white: #ffffff;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--primary); overflow-x: hidden; }
        
        /* Screens */
        .screen { display: none; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .active { display: flex; flex-direction: column; }

        /* Welcome Page */
        #welcome-page { background: linear-gradient(135deg, #1a2a3a 0%, #000000 100%); color: white; justify-content: center; align-items: center; text-align: center; }
        .hero-btn { padding: 18px 60px; font-size: 1.4rem; border: none; border-radius: 50px; background: var(--secondary); color: white; cursor: pointer; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s; }

        /* Mode Selection Blocks */
        .mode-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; margin: 40px auto; }
        .mode-block { background: var(--white); padding: 40px; border-radius: 20px; text-align: center; cursor: pointer; transition: 0.3s; border-bottom: 8px solid var(--grey); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .mode-block:hover { transform: translateY(-10px); border-bottom-color: var(--secondary); }
        .mode-block h2 { color: var(--primary); margin-bottom: 10px; }

        /* Level Grid */
        .level-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        .level-card { background: white; padding: 20px; border-radius: 12px; border-top: 6px solid var(--grey); text-align: center; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        /* Dynamic Status Colors */
        .status-never { border-top-color: var(--grey); }
        .status-started { border-top-color: var(--amber); }
        .status-completed { border-top-color: var(--secondary); }
        .status-failed { border-top-color: var(--red); }

        /* Learning Area */
        .content-card { background: white; max-width: 700px; margin: 20px auto; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .arabic-display { font-size: 2.5rem; font-weight: bold; text-align: right; direction: rtl; margin: 20px 0; color: #000; }
        input[type="text"] { width: 100%; padding: 15px; font-size: 1.2rem; border: 2px solid #ddd; border-radius: 10px; margin-top: 10px; box-sizing: border-box; }

        .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: var(--primary); color: white; margin: 5px; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <section id="welcome-page" class="screen active">
        <h1>MARHABAN</h1>
        <p>Your Database-Driven Journey to Arabic Fluency</p>
        <button class="hero-btn" onclick="showScreen('mode-selection')">ENTER ACADEMY</button>
    </section>

    <section id="mode-selection" class="screen">
        <h1 style="text-align: center;">Choose Your Path</h1>
        <div class="mode-container">
            <div class="mode-block" onclick="startMode('words')">
                <h2>📚 WORDS</h2>
                <p>10 Words + 10 Sentences per Level</p>
            </div>
            <div class="mode-block" onclick="startMode('sentences')">
                <h2>✍️ SENTENCES</h2>
                <p>Easy, Medium & Advanced Translation</p>
            </div>
            <div class="mode-block" onclick="startMode('practice')">
                <h2>⌨️ PRACTICE</h2>
                <p>Keyboard Typing & Script Mastery</p>
            </div>
        </div>
        <button class="btn" style="margin: auto;" onclick="showScreen('welcome-page')">Back</button>
    </section>

    <section id="level-page" class="screen">
        <button class="btn" onclick="showScreen('mode-selection')">← Back to Modes</button>
        <h2 id="mode-title" style="text-align:center;"></h2>
        <div class="level-grid" id="level-grid"></div>
    </section>

    <section id="study-page" class="screen">
        <div class="content-card">
            <button class="btn" onclick="showScreen('level-page')">Exit</button>
            <div id="study-content">
                </div>
            <div id="quiz-area" class="hidden">
                <hr>
                <h3 id="q-text">Translate the following:</h3>
                <div id="q-arabic" class="arabic-display"></div>
                <div id="q-options"></div>
                <div id="practice-input-area" class="hidden">
                    <p>Type the Arabic text exactly:</p>
                    <input type="text" id="typing-input" placeholder="Start typing here..." dir="rtl">
                </div>
                <button class="btn" style="background:var(--secondary); width:100%; margin-top:20px;" onclick="checkAnswer()">SUBMIT</button>
            </div>
        </div>
    </section>

    <script>
        let currentMode = '';
        let currentLevel = 0;
        let progress = JSON.parse(localStorage.getItem('ara_pro_data')) || { words: {}, sentences: {}, practice: {} };

        // 100 Level Topic list from previous plan
        const topics = ["Greetings", "Colors", "Family", "Numbers", "House", "Kitchen", "Food", "Places", "Pronouns", "Verbs"]; // ... (expand to 100)

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function startMode(mode) {
            currentMode = mode;
            document.getElementById('mode-title').innerText = mode.toUpperCase() + " MASTERY";
            renderLevels();
            showScreen('level-page');
        }

        function renderLevels() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= 100; i++) {
                const status = progress[currentMode][i] || 'never';
                const div = document.createElement('div');
                div.className = `level-card status-${status}`;
                div.innerHTML = `<strong>Level ${i}</strong><br><small>${topics[i-1] || 'New Topic'}</small>`;
                div.onclick = () => loadLevel(i);
                grid.appendChild(div);
            }
        }

        function loadLevel(lvl) {
            currentLevel = lvl;
            if(progress[currentMode][lvl] === 'never' || !progress[currentMode][lvl]) {
                progress[currentMode][lvl] = 'started';
                save();
            }
            showScreen('study-page');
            const container = document.getElementById('study-content');
            const quiz = document.getElementById('quiz-area');
            const practice = document.getElementById('practice-input-area');
            
            quiz.classList.remove('hidden');
            practice.classList.add('hidden');

            if (currentMode === 'words') {
                container.innerHTML = `<h2>Level ${lvl}: Vocabulary</h2><p>Review the 10 words and sentences below before starting the quiz.</p>`;
                // Logic to inject 10 words/sentences
            } 
            else if (currentMode === 'sentences') {
                let difficulty = lvl < 30 ? "EASY" : lvl < 70 ? "MEDIUM" : "ADVANCED";
                container.innerHTML = `<h2>Level ${lvl}: ${difficulty}</h2><p>Translate full sentences and paragraphs.</p>`;
            } 
            else if (currentMode === 'practice') {
                container.innerHTML = `<h2>Level ${lvl}: Typing</h2>`;
                practice.classList.remove('hidden');
            }
            
            setupQuiz(lvl);
        }

        function setupQuiz(lvl) {
            // Placeholder quiz setup
            document.getElementById('q-arabic').innerText = "مَرْحَبًا"; 
        }

        function checkAnswer() {
            // Custom Logic for validation
            // If passed: progress[currentMode][currentLevel] = 'completed';
            // If failed: progress[currentMode][currentLevel] = 'failed';
            progress[currentMode][currentLevel] = 'completed'; // Force green for demo
            save();
            alert("Level Updated!");
            showScreen('level-page');
            renderLevels();
        }

        function save() { localStorage.setItem('ara_pro_data', JSON.stringify(progress)); }
    </script>
</body>
</html>
