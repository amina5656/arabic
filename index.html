<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Mastery - Phonetic Edition</title>
    <style>
        :root {
            --primary: #1a2a3a;
            --secondary: #27ae60;
            --accent: #d35400;
            --bg: #f4f7f6;
            --white: #ffffff;
            --locked: #bdc3c7;
        }

        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; color: var(--primary); }

        /* Welcome Page */
        #welcome-screen {
            height: 100vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; background: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            color: white; text-align: center;
        }

        .btn-main {
            padding: 15px 50px; font-size: 1.2rem; border-radius: 8px; border: none;
            background: var(--secondary); color: white; cursor: pointer; transition: 0.3s;
            font-weight: bold; margin-top: 20px;
        }

        /* Dashboard */
        #main-app { display: none; padding: 20px; max-width: 800px; margin: auto; }
        
        .progress-bar { background: #ddd; height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 10px; }
        #progress-fill { background: var(--secondary); height: 100%; width: 0%; transition: 0.8s; }

        .module-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }

        .module-card {
            background: white; padding: 20px; border-radius: 12px; border-left: 10px solid var(--locked);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; position: relative;
        }
        .module-card.unlocked { border-left-color: var(--secondary); }
        .module-card.locked { opacity: 0.6; cursor: not-allowed; }

        /* Lesson View */
        .card-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .item-row { display: flex; flex-direction: column; padding: 15px 0; border-bottom: 1px solid #eee; }
        .item-row:last-child { border-bottom: none; }
        
        .arabic-text { font-size: 2.2rem; font-weight: bold; color: #000; direction: rtl; margin-bottom: 5px; }
        .pronunciation { font-size: 1.1rem; color: var(--accent); font-style: italic; font-weight: 500; }
        .translation { font-size: 1.2rem; color: #444; font-weight: bold; }

        /* Quiz */
        #quiz-box { display: none; background: white; padding: 30px; border-radius: 15px; text-align: center; }
        .option-btn { 
            display: block; width: 100%; padding: 15px; margin: 10px 0; 
            border: 1px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 1.1rem;
        }
        .option-btn:hover { background: #f0f0f0; }

        .hidden { display: none; }
        .back-link { cursor: pointer; color: var(--accent); margin-bottom: 20px; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

    <section id="welcome-screen">
        <h1>ARABIC ACADEMY</h1>
        <p>100 Levels of Mastery • Progress Saved</p>
        <button class="btn-main" onclick="initApp()">START LEARNING</button>
    </section>

    <main id="main-app">
        <div id="dashboard">
            <h2>Course Progress</h2>
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <div id="module-list" class="module-grid"></div>
        </div>

        <div id="lesson-view" class="hidden">
            <div class="back-link" onclick="showDashboard()">← Back to Dashboard</div>
            <h2 id="lesson-title"></h2>
            
            <div class="card-box">
                <h3>Vocabulary & Pronunciation</h3>
                <div id="vocab-container"></div>
            </div>

            <div class="card-box">
                <h3>Practice Sentences</h3>
                <div id="sentence-container"></div>
            </div>

            <button class="btn-main" style="width:100%;" onclick="startQuiz()">TAKE THE QUIZ</button>
        </div>

        <div id="quiz-box">
            <h2 id="q-text">Question</h2>
            <div id="q-ui">
                <div id="q-display" class="arabic-text" style="text-align:center; display:block; margin:20px 0;"></div>
                <div id="q-options"></div>
            </div>
            <p id="q-feedback"></p>
        </div>
    </main>

    <script>
        const courseData = [
            {
                id: 0, title: "Level 1: Greetings",
                words: [
                    {a:"مَرْحَبًا", e:"Hello", p:"Mar-ha-ban"}, {a:"أَهْلًا", e:"Welcome", p:"Ah-lan"},
                    {a:"شُكْرًا", e:"Thank you", p:"Shuk-ran"}, {a:"عَفْوًا", e:"You're welcome", p:"Af-wan"},
                    {a:"كَيْفَ حَالُكَ؟", e:"How are you?", p:"Kay-fa Ha-luk?"}, {a:"أَنَا بِخَيْر", e:"I am fine", p:"A-na Bi-khayr"},
                    {a:"صَبَاحُ الْخَيْرِ", e:"Good Morning", p:"Sa-ba-hul Khayr"}, {a:"مَسَاءُ الْخَيْرِ", e:"Good Evening", p:"Ma-sa-ul Khayr"},
                    {a:"مَعَ السَّلَامَةِ", e:"Goodbye", p:"Ma-as Sa-la-mah"}, {a:"تَصْبَحُ عَلَى خَيْر", e:"Good night", p:"Tas-bah A-la Khayr"}
                ],
                sentences: [
                    {a:"مَرْحَبًا، كَيْفَ حَالُكَ؟", e:"Hello, how are you?", p:"Marhaban, kayfa haluk?"},
                    {a:"أَنَا بِخَيْر، شُكْرًا", e:"I am fine, thank you", p:"Ana bikhayr, shukran"},
                    {a:"صَبَاحُ الْخَيْرِ يَا أُمِّي", e:"Good morning, mother", p:"Sabahul khayri ya ummi"},
                    {a:"عَفْوًا، مَعَ السَّلَامَةِ", e:"You are welcome, goodbye", p:"Afwan, ma'as salamah"},
                    {a:"أَهْلًا وَسَهْلًا بِكُمْ", e:"Welcome to you all", p:"Ahlan wa sahlan bikum"}
                ]
            },
            {
                id: 1, title: "Level 2: Colours",
                words: [
                    {a:"أَبْيَض", e:"White", p:"Ab-yad"}, {a:"أَسْوَد", e:"Black", p:"As-wad"},
                    {a:"أَحْمَر", e:"Red", p:"Ah-mar"}, {a:"أَزْرَق", e:"Blue", p:"Az-raq"},
                    {a:"أَخْضَر", e:"Green", p:"Akh-dar"}, {a:"أَصْفَر", e:"Yellow", p:"As-far"},
                    {a:"بُرْتُقَالِي", e:"Orange", p:"Bur-tu-qa-li"}, {a:"وَرْدِي", e:"Pink", p:"War-di"},
                    {a:"بَنَفْسَجِي", e:"Purple", p:"Ba-naf-sa-ji"}, {a:"بُنِّي", e:"Brown", p:"Bun-ni"}
                ],
                sentences: [
                    {a:"التُّفَّاحُ أَحْمَر", e:"The apple is red", p:"At-tuffahu ahmar"},
                    {a:"السَّمَاءُ أَزْرَق", e:"The sky is blue", p:"As-samau azraq"},
                    {a:"الْعُشْبُ أَخْضَر", e:"The grass is green", p:"Al-ushbu akhdar"},
                    {a:"هَذَا كِتَابٌ أَسْوَد", e:"This is a black book", p:"Hadha kitabun aswad"},
                    {a:"أَنَا أُحِبُّ اللَّوْنَ الْوَرْدِي", e:"I love the color pink", p:"Ana uhibbul lawnal wardi"}
                ]
            },
            {
                id: 2, title: "Level 3: Family",
                words: [
                    {a:"أَب", e:"Father", p:"Ab"}, {a:"أُم", e:"Mother", p:"Umm"},
                    {a:"أَخ", e:"Brother", p:"Akh"}, {a:"أُخْت", e:"Sister", p:"Ukht"},
                    {a:"جَدّ", e:"Grandfather", p:"Jadd"}, {a:"جَدَّة", e:"Grandmother", p:"Jaddah"},
                    {a:"اِبْن", e:"Son", p:"Ibn"}, {a:"اِبْنَة", e:"Daughter", p:"Ibnah"},
                    {a:"عَمّ", e:"Uncle (Dad side)", p:"Amm"}, {a:"خَال", e:"Uncle (Mom side)", p:"Khaal"}
                ],
                sentences: [
                    {a:"هَذَا أَبِي وَهَذِهِ أُمِّي", e:"This is my father and this is my mother", p:"Hadha abi wa hadhihi ummi"},
                    {a:"أَنَا أُحِبُّ أُخْتِي", e:"I love my sister", p:"Ana uhibbu ukhti"},
                    {a:"أَخِي يَلْعَبُ", e:"My brother is playing", p:"Akhi yal'ab"},
                    {a:"جَدِّي رَجُلٌ طَيِّب", e:"My grandfather is a good man", p:"Jaddi rajulun tayyib"},
                    {a:"عِنْدِي اِبْنَةٌ جَمِيلَة", e:"I have a beautiful daughter", p:"Indi ibnatun jamilah"}
                ]
            }
        ];

        let userProgress = JSON.parse(localStorage.getItem('arabic_academy_v1')) || { unlocked: 0 };
        let currentLevel = 0;
        let quizPool = [];
        let score = 0;
        let qIdx = 0;

        function save() { localStorage.setItem('arabic_academy_v1', JSON.stringify(userProgress)); }

        function initApp() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            showDashboard();
        }

        function showDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('lesson-view').classList.add('hidden');
            document.getElementById('quiz-box').style.display = 'none';
            const list = document.getElementById('module-list');
            list.innerHTML = "";
            courseData.forEach((lvl, i) => {
                const isUn = i <= userProgress.unlocked;
                const div = document.createElement('div');
                div.className = `module-card ${isUn ? 'unlocked' : 'locked'}`;
                div.innerHTML = `<h3>${lvl.title}</h3><p>${isUn ? 'Tap to Study' : '🔒 Locked'}</p>`;
                if(isUn) div.onclick = () => startLesson(i);
                list.appendChild(div);
            });
            document.getElementById('progress-fill').style.width = ((userProgress.unlocked+1)/courseData.length*100) + "%";
        }

        function startLesson(i) {
            currentLevel = i;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('lesson-view').classList.remove('hidden');
            document.getElementById('lesson-title').innerText = courseData[i].title;
            
            const vC = document.getElementById('vocab-container');
            const sC = document.getElementById('sentence-container');
            vC.innerHTML = ""; sC.innerHTML = "";

            courseData[i].words.forEach(w => {
                vC.innerHTML += `<div class="item-row"><div class="arabic-text">${w.a}</div><div class="pronunciation">Pronounced: ${w.p}</div><div class="translation">English: ${w.e}</div></div>`;
            });
            courseData[i].sentences.forEach(s => {
                sC.innerHTML += `<div class="item-row"><div class="arabic-text">${s.a}</div><div class="pronunciation">Pronounced: ${s.p}</div><div class="translation">English: ${s.e}</div></div>`;
            });
        }

        function startQuiz() {
            document.getElementById('lesson-view').classList.add('hidden');
            document.getElementById('quiz-box').style.display = 'block';
            quizPool = [...courseData[currentLevel].words, ...courseData[currentLevel].sentences];
            quizPool.sort(() => Math.random() - 0.5);
            score = 0; qIdx = 0;
            ask();
        }

        function ask() {
            if(qIdx >= quizPool.length) { finish(); return; }
            const item = quizPool[qIdx];
            document.getElementById('q-text').innerText = `Translate Question ${qIdx+1}/15:`;
            document.getElementById('q-display').innerText = item.a;
            
            const options = [item.e];
            const decoys = [...courseData[currentLevel].words, ...courseData[currentLevel].sentences].map(x => x.e).filter(x => x !== item.e);
            while(options.length < 4 && decoys.length > 0) {
                options.push(decoys.splice(Math.floor(Math.random()*decoys.length), 1)[0]);
            }
            options.sort(() => Math.random() - 0.5);

            const optDiv = document.getElementById('q-options');
            optDiv.innerHTML = "";
            options.forEach(o => {
                const b = document.createElement('button');
                b.className = "option-btn";
                b.innerText = o;
                b.onclick = () => { if(o === item.e) score++; qIdx++; ask(); };
                optDiv.appendChild(b);
            });
        }

        function finish() {
            const pass = score === 15;
            const feedback = document.getElementById('q-feedback');
            document.getElementById('q-ui').classList.add('hidden');
            if(pass) {
                feedback.innerHTML = `<h2 style="color:green">15/15! Level Complete!</h2>`;
                if(currentLevel === userProgress.unlocked) { userProgress.unlocked++; save(); }
            } else {
                feedback.innerHTML = `<h2 style="color:red">Score: ${score}/15</h2><p>You need 100% to pass. Try again!</p>`;
            }
            setTimeout(() => { feedback.innerHTML = ""; document.getElementById('q-ui').classList.remove('hidden'); showDashboard(); }, 3000);
        }
    </script>
</body>
</html>
