<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arabic Academy: 10-Point Mastery</title>
    <style>
        :root { --primary: #1a2a3a; --success: #27ae60; --error: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; text-align: center; }
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #ccc; }
        .completed { border-top-color: var(--success) !important; }
        .arabic { font-size: 2.5rem; margin: 20px; direction: rtl; }
        input { width: 80%; padding: 15px; font-size: 1.2rem; margin: 10px; border-radius: 8px; border: 1px solid #ddd; }
        .btn { padding: 15px 30px; background: var(--primary); color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <section id="lvl-select" class="screen active">
        <h1>Arabic Mastery: Level Selection</h1>
        <div id="main-grid" class="grid"></div>
    </section>

    <section id="study-area" class="screen">
        <h2 id="session-title"></h2>
        <p id="progress-text"></p>
        <div id="display" class="arabic"></div>
        <p id="instruction"></p>
        <input type="text" id="answer-input" placeholder="Type here...">
        <br>
        <button class="btn" onclick="checkStep()">SUBMIT</button>
    </section>

    <script>
        // DATA STRUCTURE: 10 items per level
        const levelData = {
            1: {
                topic: "Greetings & Basics",
                items: [
                    { w: "مَرْحَبًا", s: "مَرْحَبًا بِكَ فِي بَيْتِي", eng_w: "hello", eng_s: "hello to you in my house", p: "مَرْحَبًا بِكَ" },
                    { w: "أَهْلًا", s: "أَهْلًا وَسَهْلًا يَا صَدِيقِي", eng_w: "welcome", eng_s: "welcome my friend", p: "أَهْلًا وَسَهْلًا" },
                    { w: "كَيْفَ", s: "كَيْفَ حَالُكَ الْيَوْم؟", eng_w: "how", eng_s: "how are you today?", p: "كَيْفَ حَالُكَ" },
                    { w: "خَيْر", s: "أَنَا بِخَيْرٍ وَالْحَمْدُ لِلَّه", eng_w: "good", eng_s: "I am good praise be to God", p: "أَنَا بِخَيْر" },
                    { w: "شُكْرًا", s: "شُكْرًا جَزِيلًا عَلَى الْمُسَاعَدَة", eng_w: "thanks", eng_s: "thanks a lot for the help", p: "شُكْرًا جَزِيلًا" },
                    { w: "عَفْوًا", s: "عَفْوًا، لَا شُكْرَ عَلَى وَاجِب", eng_w: "you are welcome", eng_s: "you are welcome no thanks for duty", p: "لَا شُكْرَ عَلَى وَاجِب" },
                    { w: "نَعَم", s: "نَعَم، أَنَا أَتَحَدَّثُ الْعَرَبِيَّة", eng_w: "yes", eng_s: "yes I speak Arabic", p: "نَعَم أَنَا أَتَحَدَّث" },
                    { w: "لَا", s: "لَا، لَا أَعْرِفُ هَذَا الرَّجُل", eng_w: "no", eng_s: "no I do not know this man", p: "لَا أَعْرِف" },
                    { w: "مِنْ فَضْلِك", s: "أَعْطِنِي الْكِتَابَ مِنْ فَضْلِك", eng_w: "please", eng_s: "give me the book please", p: "مِنْ فَضْلِك" },
                    { w: "إِلَى اللِّقَاء", s: "إِلَى اللِّقَاء فِي الْأُسْبُوعِ الْقَادِم", eng_w: "goodbye", eng_s: "goodbye next week", p: "إِلَى اللِّقَاء" }
                ]
            }
            // Add Level 2, 3... 100 here
        };

        let currentLvl = 1;
        let currentStep = 0; // 0 to 9
        let currentPhase = 'words'; // 'words', 'sentences', 'practice', 'quiz'
        let progress = JSON.parse(localStorage.getItem('ara_master_v1')) || {};

        function init() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = '';
            for(let i=1; i<=100; i++) {
                const isDone = progress[i] === 'done';
                grid.innerHTML += `<div class="card ${isDone?'completed':''}" onclick="startLevel(${i})">
                    <strong>Level ${i}</strong><br>${levelData[i] ? levelData[i].topic : 'Locked'}
                </div>`;
            }
        }

        function startLevel(lvl) {
            if(!levelData[lvl]) return alert("Level data not added yet!");
            currentLvl = lvl;
            currentStep = 0;
            currentPhase = 'words';
            showStep();
            showScreen('study-area');
        }

        function showStep() {
            const data = levelData[currentLvl].items[currentStep];
            const display = document.getElementById('display');
            const instr = document.getElementById('instruction');
            document.getElementById('progress-text').innerText = `Step ${currentStep + 1} of 10 | Mode: ${currentPhase.toUpperCase()}`;
            document.getElementById('answer-input').value = '';

            if(currentPhase === 'words') {
                display.innerText = data.w;
                instr.innerText = "Translate this word to English:";
            } else if(currentPhase === 'sentences') {
                display.innerText = data.s;
                instr.innerText = "Translate this sentence to English:";
            } else if(currentPhase === 'practice') {
                display.innerText = data.p;
                instr.innerText = "TYPE the Arabic exactly:";
            }
        }

        function checkStep() {
            const val = document.getElementById('answer-input').value.trim().toLowerCase();
            const data = levelData[currentLvl].items[currentStep];
            let correct = false;

            if(currentPhase === 'words' && val === data.eng_w) correct = true;
            if(currentPhase === 'sentences' && val === data.eng_s) correct = true;
            if(currentPhase === 'practice' && document.getElementById('answer-input').value.trim() === data.p) correct = true;

            if(correct) {
                if(currentStep < 9) {
                    currentStep++;
                    showStep();
                } else {
                    handlePhaseEnd();
                }
            } else {
                alert("Incorrect. Try again!");
            }
        }

        function handlePhaseEnd() {
            if(currentPhase === 'words') {
                alert("Words Complete! Moving to Sentences.");
                currentPhase = 'sentences';
                currentStep = 0;
                showStep();
            } else if(currentPhase === 'sentences') {
                alert("Sentences Complete! Moving to Practice.");
                currentPhase = 'practice';
                currentStep = 0;
                showStep();
            } else {
                alert("Level " + currentLvl + " MASTERED!");
                progress[currentLvl] = 'done';
                localStorage.setItem('ara_master_v1', JSON.stringify(progress));
                showScreen('lvl-select');
                init();
            }
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        window.onload = init;
    </script>
</body>
</html>
