<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arabic Academy - 10x10 Mastery</title>
    <style>
        :root { --primary: #1a2a3a; --secondary: #27ae60; --accent: #d35400; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); margin: 0; color: var(--primary); }
        #welcome-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: radial-gradient(circle, #2c3e50 0%, #000000 100%); color: white; text-align: center; }
        .btn-main { padding: 15px 50px; font-size: 1.2rem; border-radius: 8px; border: none; background: var(--secondary); color: white; cursor: pointer; transition: 0.3s; font-weight: bold; margin-top: 20px; }
        #main-app { display: none; padding: 20px; max-width: 800px; margin: auto; }
        .progress-bar { background: #ddd; height: 12px; border-radius: 6px; overflow: hidden; margin-bottom: 10px; }
        #progress-fill { background: var(--secondary); height: 100%; width: 0%; transition: 0.8s; }
        .module-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .module-card { background: white; padding: 20px; border-radius: 12px; border-left: 10px solid #bdc3c7; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; }
        .module-card.unlocked { border-left-color: var(--secondary); }
        .card-box { background: white; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .pair-container { padding: 15px 0; border-bottom: 2px solid #f0f0f0; }
        .pair-container:last-child { border-bottom: none; }
        .word-row { margin-bottom: 10px; }
        .sentence-row { padding-left: 20px; border-left: 3px solid var(--accent); background: #fffcf9; padding: 10px; border-radius: 0 8px 8px 0; }
        .arabic-text { font-size: 2rem; font-weight: bold; color: #000; direction: rtl; }
        .pronunciation { font-size: 1rem; color: var(--accent); font-style: italic; }
        .translation { font-size: 1.1rem; color: #444; font-weight: bold; }
        #quiz-box { display: none; background: white; padding: 30px; border-radius: 15px; text-align: center; }
        .option-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; font-size: 1.1rem; background: white; transition: 0.2s; }
        .correct { background-color: #2ecc71 !important; color: white !important; border-color: #27ae60 !important; }
        .wrong { background-color: #e74c3c !important; color: white !important; border-color: #c0392b !important; }
        .hidden { display: none; }
        .back-link { cursor: pointer; color: var(--accent); margin-bottom: 20px; display: inline-block; font-weight: bold; }
    </style>
</head>
<body>

    <section id="welcome-screen">
        <h1>ARABIC ACADEMY</h1>
        <p>100 Full Levels • 10 Items Per Level</p>
        <button class="btn-main" onclick="initApp()">START LEARNING</button>
    </section>

    <main id="main-app">
        <div id="dashboard">
            <h2>Your Course Progress</h2>
            <div class="progress-bar"><div id="progress-fill"></div></div>
            <div id="module-list" class="module-grid"></div>
        </div>

        <div id="lesson-view" class="hidden">
            <div class="back-link" onclick="showDashboard()">← Back to Dashboard</div>
            <h2 id="lesson-title"></h2>
            <div class="card-box" id="content-container"></div>
            <button class="btn-main" style="width:100%;" onclick="startQuiz()">TAKE THE QUIZ</button>
        </div>

        <div id="quiz-box">
            <h2 id="q-text">Question</h2>
            <div id="q-ui">
                <div id="q-display" class="arabic-text" style="text-align:center; display:block; margin:20px 0;"></div>
                <div id="q-options"></div>
            </div>
            <p id="q-feedback"></p>
        </div>
    </main>

                    {w:{a:"مَسْجِد", e:"Mosque", p:"Mas-jid"}, s:{a:"الْمَسْجِدُ مَكَانٌ مُقَدَّس", e:"The mosque is a holy place", p:"Al-mas-ji-du ma-ka-nun mu-qad-das"}},
                    {w:{a:"مُسْتَشْفَى", e:"Hospital", p:"Mus-tash-fa"}, s:{a:"أَذْهَبُ إِلَى الْمُسْتَشْفَى", e:"I am going to the hospital", p:"Adh-ha-bu i-lal mus-tash-fa"}},
                    {w:{a:"طَرِيق", e:"Road", p:"Ta-riq"}, s:{a:"الطَّرِيقُ مُزْدَحِمٌ جِدًّا", e:"The road is very crowded", p:"At-ta-ri-qu muz-da-hi-mun jid-dan"}},
                    {w:{a:"مَدِينَة", e:"City", p:"Ma-di-nah"}, s:{a:"أَعِيشُ فِي مَدِينَةٍ كَبِيرَة", e:"I live in a big city", p:"A-i-shu fi ma-di-na-tin ka-bi-rah"}},
                    {w:{a:"شَارِع", e:"Street", p:"Sha-ri"}, s:{a:"هَذَا الشَّارِعُ هَادِئ", e:"This street is quiet", p:"Ha-dhash sha-ri-u ha-di"}},
                    {w:{a:"مَحَلّ", e:"Shop", p:"Ma-hall"}, s:{a:"الْمَحَلُّ مَفْتُوحٌ الآن", e:"The shop is open now", p:"Al-ma-hal-lu maf-tu-hun al-an"}},
                    {w:{a:"فُنْدُق", e:"Hotel", p:"Fun-duq"}, s:{a:"أَسْكُنُ فِي فُنْدُقٍ جَمِيل", e:"I am staying in a beautiful hotel", p:"As-ku-nu fi fun-du-qin ja-mil"}},
                    {w:{a:"مَطْعَم", e:"Restaurant", p:"Mat-am"}, s:{a:"هَذَا الْمَطْعَمُ يُقَدِّمُ طَعَامًا لَذِيذًا", e:"This restaurant serves delicious food", p:"Ha-dhal mat-a-mu yu-qad-di-mu ta-a-man la-dhi-dhan"}}
                ]
            },
            {
                id: 8, title: "Level 9: Personal Pronouns",
                pairs: [
                    {w:{a:"أَنَا", e:"I", p:"A-na"}, s:{a:"أَنَا طَالِبٌ مُجْتَهِد", e:"I am a hardworking student", p:"A-na ta-li-bun muj-ta-hid"}},
                    {w:{a:"أَنْتَ", e:"You (m)", p:"An-ta"}, s:{a:"أَنْتَ رَجُلٌ طَيِّب", e:"You are a good man", p:"An-ta ra-ju-lun tay-yib"}},
                    {w:{a:"أَنْتِ", e:"You (f)", p:"An-ti"}, s:{a:"أَنْتِ بِنْتٌ ذَكِيَّة", e:"You are a smart girl", p:"An-ti bin-tun dha-kiy-yah"}},
                    {w:{a:"هُوَ", e:"He", p:"Hu-wa"}, s:{a:"هُوَ يَلْعَبُ الْآن", e:"He is playing now", p:"Hu-wa yal-a-bul an"}},
                    {w:{a:"هِيَ", e:"She", p:"Hi-ya"}, s:{a:"هِيَ تَقْرَأُ كِتَابًا", e:"She is reading a book", p:"Hi-ya taq-ra-u ki-ta-ban"}},
                    {w:{a:"نَحْنُ", e:"We", p:"Nah-nu"}, s:{a:"نَحْنُ نُسَافِرُ غَدًا", e:"We are traveling tomorrow", p:"Nah-nu nu-sa-fi-ru gha-dan"}},
                    {w:{a:"أَنْتُمْ", e:"You all (m)", p:"An-tum"}, s:{a:"أَنْتُمْ طُلَّابٌ كِبَار", e:"You all are big students", p:"An-tum tul-la-bun ki-bar"}},
                    {w:{a:"أَنْتُنَّ", e:"You all (f)", p:"An-tun-na"}, s:{a:"أَنْتُنَّ طَالِبَاتٌ مُجْتَهِدَات", e:"You all (f) are hardworking students", p:"An-tun-na ta-li-ba-tun muj-ta-hi-dat"}},
                    {w:{a:"هُمْ", e:"They (m)", p:"Hum"}, s:{a:"هُمْ فِي السَّاحَةِ", e:"They are in the courtyard", p:"Hum fis sa-hah"}},
                    {w:{a:"هُنَّ", e:"They (f)", p:"Hun-na"}, s:{a:"هُنَّ يَلْعَبْنَ مَعًا", e:"They (f) are playing together", p:"Hun-na yal-ab-na ma-an"}}
                ]
            },
            {
                id: 9, title: "Level 10: Daily Actions (Verbs)",
                pairs: [
                    {w:{a:"يَأْكُل", e:"Eat", p:"Ya'-kul"}, s:{a:"هُوَ يَأْكُلُ الْغَدَاء", e:"He is eating lunch", p:"Hu-wa ya'-ku-lul gha-da"}},
                    {w:{a:"يَشْرَب", e:"Drink", p:"Yash-rab"}, s:{a:"أَشْرَبُ الشَّايَ مَعَ الْحَلِيب", e:"I drink tea with milk", p:"Ash-ra-bush sha-ya ma-al ha-lib"}},
                    {w:{a:"يَذْهَب", e:"Go", p:"Yadh-hab"}, s:{a:"أَذْهَبُ إِلَى الْعَمَلِ صَبَاحًا", e:"I go to work in the morning", p:"Adh-ha-bu i-lal a-ma-li sa-ba-han"}},
                    {w:{a:"يَنَام", e:"Sleep", p:"Ya-nam"}, s:{a:"أَنَامُ مُبَكِّرًا كُلَّ لَيْلَة", e:"I sleep early every night", p:"A-na-mu mu-bak-ki-ran kul-la lay-lah"}},
                    {w:{a:"يَقْرَأ", e:"Read", p:"Yaq-ra'"}, s:{a:"هِيَ تَقْرَأُ الْقُرْآنَ الْكَرِيم", e:"She is reading the Holy Quran", p:"Hi-ya taq-ra-ul qur-a-nal ka-rim"}},
                    {w:{a:"يَكْتُب", e:"Write", p:"Yak-tub"}, s:{a:"أَكْتُبُ رِسَالَةً لِصَدِيقِي", e:"I am writing a letter to my friend", p:"Ak-tu-bu ri-sa-la-tan li-sa-di-qi"}},
                    {w:{a:"يَسْمَع", e:"Hear/Listen", p:"Yas-ma"}, s:{a:"أَسْمَعُ الْأَذَانَ الْآن", e:"I hear the Adhan now", p:"As-ma-ul a-dha-nal an"}},
                    {w:{a:"يَتَكَلَّم", e:"Speak", p:"Ya-ta-kal-lam"}, s:{a:"أَتَكَلَّمُ الْعَرَبِيَّةَ قَلِيلًا", e:"I speak Arabic a little", p:"A-ta-kal-la-mul a-ra-biy-ya-ta qa-li-lan"}},
                    {w:{a:"يَمْشِي", e:"Walk", p:"Yam-shi"}, s:{a:"أَمْشِي فِي الْحَدِيقَةِ", e:"I walk in the garden", p:"Am-shi fil ha-di-qah"}},
                    {w:{a:"يَجْلِس", e:"Sit", p:"Yaj-lis"}, s:{a:"يَجْلِسُ الطَّالِبُ عَلَى الْكُرْسِيِّ", e:"The student sits on the chair", p:"Yaj-li-sut ta-li-bu a-lal kur-si"}}
                ]
            }
        ];

        let userProgress = JSON.parse(localStorage.getItem('arabic_academy_v10_10')) || { unlocked: 0 };
        let currentLevel = 0, quizPool = [], score = 0, qIdx = 0, isAnswering = false;

        function save() { localStorage.setItem('arabic_academy_v10_10', JSON.stringify(userProgress)); }

        function initApp() {
            document.getElementById('welcome-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            showDashboard();
        }

        function showDashboard() {
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('lesson-view').classList.add('hidden');
            document.getElementById('quiz-box').style.display = 'none';
            const list = document.getElementById('module-list');
            list.innerHTML = "";
            courseData.forEach((lvl, i) => {
                const isUn = i <= userProgress.unlocked;
                const div = document.createElement('div');
                div.className = `module-card ${isUn ? 'unlocked' : 'locked'}`;
                div.innerHTML = `<h3>${lvl.title}</h3><p>${isUn ? 'Tap to Study' : '🔒 Locked'}</p>`;
                if(isUn) div.onclick = () => startLesson(i);
                list.appendChild(div);
            });
            document.getElementById('progress-fill').style.width = ((userProgress.unlocked+1)/courseData.length*100) + "%";
        }

        function startLesson(i) {
            currentLevel = i;
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('lesson-view').classList.remove('hidden');
            document.getElementById('lesson-title').innerText = courseData[i].title;
            const container = document.getElementById('content-container');
            container.innerHTML = "";

            courseData[i].pairs.forEach(pair => {
                container.innerHTML += `
                    <div class="pair-container">
                        <div class="word-row">
                            <div class="arabic-text">${pair.w.a}</div>
                            <div class="pronunciation">Word: ${pair.w.p}</div>
                            <div class="translation">${pair.w.e}</div>
                        </div>
                        <div class="sentence-row">
                            <div class="arabic-text" style="font-size:1.5rem;">${pair.s.a}</div>
                            <div class="pronunciation">Sentence: ${pair.s.p}</div>
                            <div class="translation">${pair.s.e}</div>
                        </div>
                    </div>`;
            });
        }

        function startQuiz() {
            document.getElementById('lesson-view').classList.add('hidden');
            document.getElementById('quiz-box').style.display = 'block';
            quizPool = [];
            courseData[currentLevel].pairs.forEach(p => {
                quizPool.push({a: p.w.a, e: p.w.e});
                quizPool.push({a: p.s.a, e: p.s.e});
            });
            quizPool.sort(() => Math.random() - 0.5);
            score = 0; qIdx = 0;
            ask();
        }

        function ask() {
            if(qIdx >= quizPool.length) { finish(); return; }
            isAnswering = false;
            const item = quizPool[qIdx];
            document.getElementById('q-text').innerText = `Question ${qIdx+1}/${quizPool.length}:`;
            document.getElementById('q-display').innerText = item.a;
            const options = [item.e];
            const decoys = courseData.flatMap(l => l.pairs.flatMap(p => [p.w.e, p.s.e])).filter(x => x !== item.e);
            while(options.length < 4) { options.push(decoys.splice(Math.floor(Math.random()*decoys.length), 1)[0]); }
            options.sort(() => Math.random() - 0.5);
            const optDiv = document.getElementById('q-options');
            optDiv.innerHTML = "";
            options.forEach(o => {
                const b = document.createElement('button');
                b.className = "option-btn";
                b.innerText = o;
                b.onclick = () => checkAnswer(b, o, item.e);
                optDiv.appendChild(b);
            });
        }

        function checkAnswer(btn, selected, correct) {
            if(isAnswering) return;
            isAnswering = true;
            if(selected === correct) { btn.classList.add('correct'); score++; }
            else { 
                btn.classList.add('wrong');
                Array.from(document.getElementsByClassName('option-btn')).forEach(b => { if(b.innerText === correct) b.classList.add('correct'); });
            }
            setTimeout(() => { qIdx++; ask(); }, 1200);
        }

        function finish() {
            const pass = score === quizPool.length;
            const feedback = document.getElementById('q-feedback');
            document.getElementById('q-ui').classList.add('hidden');
            if(pass) {
                feedback.innerHTML = `<h2 style="color:green">${score}/${quizPool.length}! PERFECT!</h2>`;
                if(currentLevel === userProgress.unlocked) { userProgress.unlocked++; save(); }
            } else {
                feedback.innerHTML = `<h2 style="color:red">${score}/${quizPool.length}</h2><p>100% required to pass. Try again!</p>`;
            }
            setTimeout(() => { feedback.innerHTML = ""; document.getElementById('q-ui').classList.remove('hidden'); showDashboard(); }, 3000);
        }
    </script>
</body>
</html>
