<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arabic Academy: Pro Mastery</title>
    <style>
        :root { --primary: #1a2a3a; --success: #27ae60; --bg: #f4f7f6; --accent: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; color: var(--primary); text-align: center; }
        .screen { display: none; padding: 20px; min-height: 100vh; flex-direction: column; align-items: center; }
        .active { display: flex; }
        
        /* Dashboard & Hub */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; width: 100%; max-width: 900px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; cursor: pointer; border-top: 6px solid #bdc3c7; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card.completed { border-top-color: var(--success); }
        .block-container { display: flex; gap: 20px; margin-top: 40px; width: 100%; max-width: 800px; }
        .block { flex: 1; background: white; padding: 30px; border-radius: 15px; cursor: pointer; border-bottom: 8px solid #bdc3c7; }
        .block.done { border-bottom-color: var(--success); }

        /* List View (Study Phase) */
        .study-list { background: white; width: 100%; max-width: 600px; padding: 20px; border-radius: 15px; text-align: right; }
        .list-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; font-size: 1.2rem; }
        .ara-text { font-weight: bold; font-size: 1.4rem; color: #000; }

        /* Quiz View */
        .quiz-box { background: white; width: 100%; max-width: 600px; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 20px; }
        .display-main { font-size: 2.5rem; margin: 20px 0; font-weight: bold; }
        input { width: 90%; padding: 15px; font-size: 1.3rem; border: 2px solid #ddd; border-radius: 8px; direction: rtl; text-align: center; }
        .btn { padding: 15px 30px; background: var(--primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

    <section id="welcome" class="screen active" style="justify-content:center; background: var(--primary); color:white;">
        <h1>WELCOME AMINA</h1>
        <p>Your Oracle for Arabic Mastery</p>
        <button class="btn" style="width:auto; background:var(--success);" onclick="showScreen('lvl-select')">OPEN DASHBOARD</button>
    </section>

    <section id="lvl-select" class="screen">
        <h2>Learning Levels</h2>
        <div id="main-grid" class="grid"></div>
    </section>

    <section id="lvl-hub" class="screen">
        <button class="btn" onclick="showScreen('lvl-select')" style="width:auto;">← Dashboard</button>
        <h2 id="hub-title"></h2>
        <div class="block-container">
            <div id="b-words" class="block" onclick="prepSession('words')"><h3>📚 WORDS</h3><p>List & Quiz</p></div>
            <div id="b-sentences" class="block" onclick="prepSession('sentences')"><h3>✍️ SENTENCES</h3><p>Context & Quiz</p></div>
            <div id="b-practice" class="block" onclick="prepSession('practice')"><h3>⌨️ PRACTICE</h3><p>English to Arabic</p></div>
        </div>
    </section>

    <section id="study-list-screen" class="screen">
        <h2 id="list-title">Review the List</h2>
        <div id="list-content" class="study-list"></div>
        <button class="btn" style="max-width:600px; background:var(--success);" onclick="startQuiz()">I'M READY FOR THE QUIZ</button>
    </section>

    <section id="quiz-area" class="screen">
        <div class="quiz-box">
            <h3 id="quiz-title"></h3>
            <p id="quiz-progress"></p>
            <div id="quiz-prompt" class="display-main"></div>
            <div id="quiz-answer" style="font-size:1.5rem; color:var(--success); margin:10px; display:none;"></div>
            <div id="quiz-input-zone" style="display:none;"><input type="text" id="quiz-input" placeholder="Type in Arabic..."></div>
            <button id="quiz-btn" class="btn" onclick="handleQuiz()">SHOW ANSWER</button>
        </div>
    </section>

    <script>
        const data = {
            1: { topic: "Greetings", items: [
                { w: "مَرْحَبًا", s: "مَرْحَبًا بِكَ", e_w: "Hello", e_s: "Hello to you", p_e: "Hello to you (Type Arabic)", p_a: "مَرْحَبًا بِكَ" },
                { w: "أَهْلًا", s: "أَهْلًا وَسَهْلًا", e_w: "Welcome", e_s: "Welcome (Formal)", p_e: "Welcome (Formal)", p_a: "أَهْلًا وَسَهْلًا" },
                { w: "شُكْرًا", s: "شُكْرًا جَزِيلًا", e_w: "Thanks", e_s: "Thank you very much", p_e: "Thank you very much", p_a: "شُكْرًا جَزِيلًا" },
                { w: "كَيْفَ", s: "كَيْفَ حَالُكَ؟", e_w: "How", e_s: "How are you?", p_e: "How are you?", p_a: "كَيْفَ حَالُكَ؟" },
                { w: "بِخَيْر", s: "أَنَا بِخَيْر", e_w: "Good", e_s: "I am good", p_e: "I am good", p_a: "أَنَا بِخَيْر" },
                { w: "مَعَ السَّلَامَة", s: "مَعَ السَّلَامَة يَا صَدِيقِي", e_w: "Goodbye", e_s: "Goodbye my friend", p_e: "Goodbye my friend", p_a: "مَعَ السَّلَامَة يَا صَدِيقِي" },
                { w: "تَفَضَّل", s: "تَفَضَّل هُنَا", e_w: "Please / Go ahead", e_s: "Please, come here", p_e: "Please, come here", p_a: "تَفَضَّل هُنَا" },
                { w: "أَيْنَ", s: "أَيْنَ أَنْتَ؟", e_w: "Where", e_s: "Where are you?", p_e: "Where are you?", p_a: "أَيْنَ أَنْتَ؟" },
                { w: "نَعَم", s: "نَعَم أَنَا هُنَا", e_w: "Yes", e_s: "Yes, I am here", p_e: "Yes, I am here", p_a: "نَعَم أَنَا هُنَا" },
                { w: "لَا", s: "لَا لَسْتُ هُنَا", e_w: "No", e_s: "No, I am not here", p_e: "No, I am not here", p_a: "لَا لَسْتُ هُنَا" }
            ]}
        };

        let curLvl = 1; let curMode = ''; let curStep = 0; let showingAns = false;
        let progress = JSON.parse(localStorage.getItem('amina_final_v1')) || {};

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'lvl-select') renderGrid();
        }

        function renderGrid() {
            const grid = document.getElementById('main-grid'); grid.innerHTML = '';
            for(let i=1; i<=100; i++) {
                const state = progress[i] || {};
                const isDone = (state.words && state.sentences && state.practice);
                grid.innerHTML += `<div class="card ${isDone?'completed':''}" onclick="openHub(${i})"><strong>Level ${i}</strong></div>`;
            }
        }

        function openHub(lvl) {
            curLvl = lvl;
            document.getElementById('hub-title').innerText = "Level " + lvl + ": " + (data[lvl] ? data[lvl].topic : "Locked");
            const state = progress[lvl] || {};
            document.getElementById('b-words').className = 'block ' + (state.words?'done':'');
            document.getElementById('b-sentences').className = 'block ' + (state.sentences?'done':'');
            document.getElementById('b-practice').className = 'block ' + (state.practice?'done':'');
            showScreen('lvl-hub');
        }

        function prepSession(mode) {
            curMode = mode;
            if (mode === 'practice') { startQuiz(); return; } // Practice has no list phase
            
            const listContent = document.getElementById('list-content');
            listContent.innerHTML = '';
            data[curLvl].items.forEach(item => {
                const ara = mode === 'words' ? item.w : item.s;
                const eng = mode === 'words' ? item.e_w : item.e_s;
                listContent.innerHTML += `<div class="list-item"><span>${eng}</span><span class="ara-text">${ara}</span></div>`;
            });
            showScreen('study-list-screen');
        }

        function startQuiz() {
            curStep = 0; showingAns = false;
            showScreen('quiz-area');
            loadQuizItem();
        }

        function loadQuizItem() {
            const item = data[curLvl].items[curStep];
            const prompt = document.getElementById('quiz-prompt');
            const ansDiv = document.getElementById('quiz-answer');
            const inputZone = document.getElementById('quiz-input-zone');
            const btn = document.getElementById('quiz-btn');

            document.getElementById('quiz-progress').innerText = `Item ${curStep+1} of 10`;
            ansDiv.style.display = "none";
            
            if (curMode === 'words') {
                prompt.innerText = item.w; prompt.dir = "rtl";
                btn.innerText = "SHOW ANSWER";
                inputZone.style.display = "none";
            } else if (curMode === 'sentences') {
                prompt.innerText = item.s; prompt.dir = "rtl";
                btn.innerText = "SHOW ANSWER";
                inputZone.style.display = "none";
            } else {
                prompt.innerText = item.p_e; prompt.dir = "ltr";
                btn.innerText = "SUBMIT ARABIC";
                inputZone.style.display = "block";
                document.getElementById('quiz-input').value = "";
            }
        }

        function handleQuiz() {
            const item = data[curLvl].items[curStep];
            const ansDiv = document.getElementById('quiz-answer');

            if (curMode === 'practice') {
                if (document.getElementById('quiz-input').value.trim() === item.p_a) nextItem();
                else alert("Check spelling & Harakaat!");
                return;
            }

            if (!showingAns) {
                ansDiv.innerText = curMode === 'words' ? item.e_w : item.e_s;
                ansDiv.style.display = "block";
                document.getElementById('quiz-btn').innerText = "NEXT";
                showingAns = true;
            } else {
                nextItem();
            }
        }

        function nextItem() {
            if (curStep < 9) { curStep++; loadQuizItem(); showingAns = false; }
            else {
                if(!progress[curLvl]) progress[curLvl] = {};
                progress[curLvl][curMode] = true;
                localStorage.setItem('amina_final_v1', JSON.stringify(progress));
                alert(curMode.toUpperCase() + " COMPLETE!");
                openHub(curLvl);
            }
        }

        window.onload = renderGrid;
    </script>
</body>
</html>
